# Integration contracts — work-nc-whmcs v3.1.7
# Generated by analista-sistema (Fase 5)
# No REST API owned by this project — contracts are WHMCS callbacks + SSH CLI + OCS subset.

version: "1.0"
project: work-nc-whmcs
generated: "2026-06-18"

whmcs_module_callbacks:
  description: Global PHP functions invoked by WHMCS core
  entry: modules/servers/nextcloudsaas/nextcloudsaas.php
  lifecycle:
    - name: nextcloudsaas_CreateAccount
      input: WHMCS $params (serviceid, server, customfields, configoption1-9)
      output: success | error string
      side_effects:
        - SSH manage.sh create (or fast-path instanceExists)
        - tblhosting.password, domain, domainstatus
        - custom fields populated
        - AcceptOrder if Pending
    - name: nextcloudsaas_SuspendAccount
      remote: manage.sh stop
    - name: nextcloudsaas_UnsuspendAccount
      remote: manage.sh start
    - name: nextcloudsaas_TerminateAccount
      remote: manage.sh backup then remove
    - name: nextcloudsaas_ChangePackage
      remote: occ quota admin + default
    - name: nextcloudsaas_ChangePassword
      remote: OCS API then occ fallback

whmcs_hooks:
  file: includes/hooks/nextcloudsaas_hooks.php
  events:
    - ShoppingCartValidateCheckout
    - AfterShoppingCartCheckout
    - AcceptOrder
    - AfterCronJob
    - AfterModuleCreate
    - ClientAreaPageProductDetails

manage_sh_cli:
  description: Remote CLI on Nextcloud host (SSH, sudo -n)
  base_path: /opt/nextcloud-customers
  script: manage.sh
  invocations:
    - command: "{manage.sh} {clientName} {domain} create"
      timeout_seconds: 300
      produces: .credentials, docker containers app/cron/harp
    - command: "{manage.sh} {clientName} _ stop|start|backup|remove|update"
    - command: "docker exec {clientName}-app occ {args}"
      fallback_for: NextcloudAPI when HTTPS unavailable

nextcloud_ocs_api:
  description: Subset used by NextcloudAPI.php
  base: "{https://domain}/ocs/v1.php"
  auth: Basic (admin user)
  headers:
    - OCS-APIRequest: true
  endpoints:
    - method: PUT
      path: /cloud/users/{userid}
      use: password change
    - method: GET
      path: /cloud/users/{userid}
      use: user info

dns_validation:
  function: Helper::checkDnsRecords
  required_records:
    - type: A
      hostname: client_main_domain
      must_resolve_to: tblservers.ipaddress

custom_fields_contract:
  required:
    - name: "Domínio da Instância"
      maps_to: tblhosting.domain
  optional_populated_by_module:
    - Client Name
    - Nextcloud URL
    - Collabora URL
    - Signaling URL

dependency_order:
  - Helper
  - SSHManager
  - NextcloudAPI
  - nextcloudsaas.php
  - hooks
