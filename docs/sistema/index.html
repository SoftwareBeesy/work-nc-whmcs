    const DOCS = {"REQUIREMENTS.md":"---\r\nindex:\r\n  version: \"1.0\"\r\n  doc: requirements\r\n  status: aprovado\r\n  cenario: LEGADO\r\n  product_version: \"3.1.7\"\r\n  generated: \"2026-06-18\"\r\n  sections:\r\n    - visao-geral\r\n    - stakeholders\r\n    - usuarios-personas\r\n    - features-mvp\r\n    - integracoes\r\n    - requisitos-nao-funcionais\r\n    - fora-de-escopo\r\n    - premissas\r\n    - duvidas-abertas\r\n    - mapa-do-legado\r\n---\r\n\r\n# Requisitos — work-nc-whmcs (Módulo Nextcloud SaaS WHMCS)\r\n\r\n\u003e Gerado em: 2026-06-18  \r\n\u003e Status: Aprovado (baseline as-is v3.1.7)\r\n\r\n---\r\n\r\n## 1. Visão Geral\r\n\r\n**Descrição**: Módulo de servidor WHMCS que provisiona e gere instâncias Nextcloud como produto SaaS, integrando-se ao Nextcloud SaaS Manager (`manage.sh` v11.x) via SSH.\r\n\r\n**Problema que resolve**: Provedores que vendem Nextcloud via WHMCS precisam provisionar, suspender, reativar e operar instâncias sem intervenção manual por SSH em cada pedido.\r\n\r\n**Para quem**: Hosters e provedores que utilizam WHMCS + Nextcloud SaaS Manager em arquitetura compartilhada (3 containers dedicados por cliente + 8 serviços globais `shared-*`).\r\n\r\n**Objetivo de negócio**: Automatizar o ciclo de vida SaaS completo — do checkout com domínio customizado até credenciais entregues e operação contínua — com mínima intervenção do admin.\r\n\r\n**Cenário**: LEGADO (produto funcional v3.1.7 documentado as-is; esta fase Beesy prepara artefatos para manutenção e evolução).\r\n\r\n**Objetivo desta documentação**: Registrar o comportamento atual do produto e estabelecer baseline para `ARCHITECTURE.md`, `ROADMAP.md` e sprints futuras.\r\n\r\n---\r\n\r\n## 2. Stakeholders\r\n\r\n| Nome / Papel | Tipo | Prioridade | O que importa para ele |\r\n|---|---|---|---|\r\n| Admin do provedor | Usuário + operador | Alta | Provisionar sem SSH manual; destravar Orders Pending; diagnosticar DNS/SSH |\r\n| Cliente assinante | Usuário final | Alta | Contratar, configurar DNS, receber credenciais, acessar Nextcloud |\r\n| Sistema WHMCS (cron/hooks) | Automatizador | Alta | Fechar ciclo Pending→Active; provisionar quando DNS estiver correto |\r\n| Defensys / maintainer | Patrocinador técnico | Alta | Compatibilidade com manage.sh v11.x; releases e CI estáveis |\r\n\r\n---\r\n\r\n## 3. Usuários e Personas\r\n\r\n| Persona | Contexto | Principal frustração (hoje) | Objetivo | Nível técnico |\r\n|---|---|---|---|---|\r\n| Ricardo, admin NOC | Opera WHMCS e servidores Nextcloud | Orders presos em Pending após DNS corrigido; SSH falhando silenciosamente | Provisionar e operar instâncias pelo painel WHMCS | Técnico |\r\n| Marina, cliente PME | Contrata plano Nextcloud para a empresa | Não sabe configurar registro DNS A; não vê status do provisionamento | Apontar domínio, receber e-mail com acesso e usar Nextcloud | Semi-técnico |\r\n| Cron WHMCS | Processo automatizado | Hooks inconsistentes entre checkout do cliente e pedido criado pelo admin | Executar `ModuleCreate` e `AcceptOrder` sem duplicar instâncias | Sistema |\r\n\r\n---\r\n\r\n## 4. Features (MVP = baseline v3.1.7)\r\n\r\nTodas as features abaixo são **Must-have** — já implementadas e em produção.\r\n\r\n### Feature 1: Provisionamento automático com verificação DNS\r\n\r\n- **Persona**: Admin do provedor, Cliente assinante, Cron WHMCS\r\n- **Prioridade**: Must-have\r\n\r\n**Fluxo principal:**\r\n1. Cliente informa domínio no Custom Field **Domínio da Instância** no checkout (ou admin preenche antes de Accept Order).\r\n2. Hook copia domínio para `tblhosting.domain`.\r\n3. `CreateAccount` verifica registro DNS A apontando para IP do servidor WHMCS.\r\n4. Se DNS incorreto, serviço permanece pendente; cron `AfterCronJob` revalida a cada ~5 minutos.\r\n5. Quando DNS estiver correto, cron executa `ModuleCreate`; instância é criada via `manage.sh create`.\r\n6. Módulo lê `.credentials`, atualiza WHMCS, envia e-mail ao cliente e aceita Order (`Pending → Active`).\r\n\r\n**Fluxo alternativo:**\r\n- Admin clica **Provisionar Agora** para reexecutar `CreateAccount` idempotentemente sem esperar cron.\r\n\r\n**Fluxo de exceção:**\r\n- DNS incorreto após 3 dias: cron para de verificar e notifica admin.\r\n- Instância já existe no servidor: fast-path reutiliza credenciais existentes (v3.1.5+).\r\n\r\n**Regras de negócio:**\r\n- Apenas **1 registro DNS A** por cliente (domínio principal).\r\n- Collabora, Talk HPB e TURN usam hostnames globais — sem DNS por cliente.\r\n- Username Nextcloud admin é sempre `admin` (hardcoded).\r\n\r\n**Critérios de aceite:**\r\n- [ ] Com DNS A correto, cron provisiona em até 5 minutos sem ação manual\r\n- [ ] Order passa de Pending para Active após provisionamento bem-sucedido\r\n- [ ] Cliente recebe e-mail com URL, usuário `admin` e senha\r\n- [ ] Se instância já existe, módulo reutiliza `.credentials` sem erro fatal\r\n- [ ] Botão **Provisionar Agora** destrava serviço pendente\r\n\r\n---\r\n\r\n### Feature 2: Ciclo de vida WHMCS padrão\r\n\r\n- **Persona**: Admin do provedor, Sistema WHMCS\r\n- **Prioridade**: Must-have\r\n\r\n**Fluxo principal:**\r\n1. WHMCS dispara ação conforme billing (pagamento, cancelamento, upgrade).\r\n2. Módulo executa comando `manage.sh` correspondente via SSH.\r\n\r\n**Ações mapeadas:**\r\n\r\n| Ação WHMCS | Comando manage.sh | Comportamento |\r\n|---|---|---|\r\n| Suspend | `stop` | Para containers dedicados do cliente |\r\n| Unsuspend | `start` | Reinicia containers dedicados |\r\n| Terminate | `backup` + `remove` | Backup completo antes de remoção permanente |\r\n| Renew | verifica + reinicia se necessário | Garante instância ativa |\r\n| ChangePackage | `occ` quota admin + default | Altera quota de disco |\r\n| ChangePassword | API OCS (fallback SSH occ) | Atualiza senha admin + `.credentials` |\r\n\r\n**Critérios de aceite:**\r\n- [ ] Suspend para containers do cliente; Unsuspend restaura operação\r\n- [ ] Terminate executa backup antes de `remove`\r\n- [ ] ChangePackage aplica quota ao admin e define default para novos usuários\r\n\r\n---\r\n\r\n### Feature 3: Integração SSH com manage.sh\r\n\r\n- **Persona**: Admin do provedor (indiretamente)\r\n- **Prioridade**: Must-have\r\n\r\n**Fluxo principal:**\r\n1. Módulo obtém credenciais do servidor WHMCS (password ou chave SSH em config option).\r\n2. `SSHManager` conecta via phpseclib3 com fallback porta 22.\r\n3. Comandos executados com `sudo -n` (NOPASSWD).\r\n\r\n**Fluxo de exceção:**\r\n- Falha de conexão: mensagens enriquecidas (auth, timeout, PasswordAuthentication) — v3.1.1+.\r\n\r\n**Regras de negócio:**\r\n- Caminho base das instâncias: `/opt/nextcloud-customers/\u003ccliente\u003e/`.\r\n- Prefixo opcional de nome de cliente via config option do módulo.\r\n\r\n**Critérios de aceite:**\r\n- [ ] Test Connection no WHMCS retorna sucesso com credenciais válidas\r\n- [ ] Erros SSH exibem dica acionável ao admin\r\n\r\n---\r\n\r\n### Feature 4: Custom Fields e sincronização de domínio\r\n\r\n- **Persona**: Admin do provedor, Cliente assinante\r\n- **Prioridade**: Must-have\r\n\r\n**Fluxo principal:**\r\n1. Campo obrigatório **Domínio da Instância** no produto WHMCS.\r\n2. Hook `AfterShoppingCartCheckout` copia valor para `tblhosting.domain`.\r\n3. Hook `AcceptOrder` faz o mesmo para pedidos criados pelo admin.\r\n4. `Helper::getDomain()` resolve domínio em cascata (params, custom fields, DB).\r\n\r\n**Regras de negócio:**\r\n- Sem Custom Field **Domínio da Instância**, `CreateAccount` aborta com mensagem específica.\r\n- Lookup tolerante a acentos/case/encoding (v3.1.7).\r\n\r\n**Critérios de aceite:**\r\n- [ ] Checkout do cliente popula domínio automaticamente\r\n- [ ] Pedido criado pelo admin funciona após preencher Custom Field antes de Accept Order\r\n\r\n---\r\n\r\n### Feature 5: Painel administrativo (Module Commands)\r\n\r\n- **Persona**: Admin do provedor\r\n- **Prioridade**: Must-have\r\n\r\n**Botões disponíveis:**\r\n- Provisionar Agora, Verificar Estado, Verificar DNS, Serviços Compartilhados\r\n- Reiniciar Instância, Fazer Backup, Atualizar Instância\r\n- Testar Conexão SSH, Testar API Nextcloud\r\n- Ver Credenciais, Ver Logs, Ver Logs Talk Recording\r\n- Listar Instâncias do Servidor\r\n\r\n**Critérios de aceite:**\r\n- [ ] Verificar Estado mostra status dos 3 containers dedicados\r\n- [ ] Verificar DNS exibe tabela com IP esperado vs resolvido\r\n- [ ] Ver Credenciais exibe painel HTML (inclui HaRP Shared Key no admin)\r\n\r\n---\r\n\r\n### Feature 6: Área do cliente\r\n\r\n- **Persona**: Cliente assinante\r\n- **Prioridade**: Must-have\r\n\r\n**Fluxo principal:**\r\n1. Cliente acessa serviço no WHMCS.\r\n2. Template `clientarea.tpl` exibe status, DNS necessário, uso de disco, credenciais e links.\r\n\r\n**Regras de negócio:**\r\n- HaRP Shared Key **não** é exibida ao cliente (v3.1.7) — credencial interna AppAPI.\r\n- Serviços globais `shared-*` listados como contexto, sem URLs de infra interna.\r\n\r\n**Critérios de aceite:**\r\n- [ ] Cliente vê aviso DNS enquanto serviço pendente\r\n- [ ] Links de acesso ao Nextcloud funcionam após provisionamento\r\n- [ ] Barra de uso de disco reflete `du -sh` no servidor\r\n\r\n---\r\n\r\n### Feature 7: Notificações e timeouts\r\n\r\n- **Persona**: Cliente assinante, Admin do provedor\r\n- **Prioridade**: Must-have\r\n\r\n**Fluxo principal:**\r\n1. Após provisionamento automático, e-mail HTML com credenciais é enviado ao cliente.\r\n2. Se DNS não configurado em 3 dias, admin recebe notificação.\r\n\r\n**Critérios de aceite:**\r\n- [ ] E-mail de provisionamento contém URL, usuário e senha\r\n- [ ] Timeout de 3 dias interrompe verificação DNS e alerta admin\r\n\r\n---\r\n\r\n### Feature 8: Qualidade e release\r\n\r\n- **Persona**: Defensys / maintainer\r\n- **Prioridade**: Must-have\r\n\r\n**Componentes:**\r\n- PHPUnit 10.5 em `tests/` — contrato Helper (1 DNS, 3 containers, 8 shared-services)\r\n- CI GitHub Actions: `php -l` em PRs; release ZIP automático em tag `vX.Y.Z`\r\n- `whmcs.json::version` deve bater com tag de release\r\n\r\n**Critérios de aceite:**\r\n- [ ] Suite PHPUnit passa localmente e em CI\r\n- [ ] Tag `v3.1.7` gera release com ZIP instalável na raiz WHMCS\r\n\r\n---\r\n\r\n## 5. Integrações\r\n\r\n| Sistema | Tipo | Direção | Autenticação | Fallback |\r\n|---|---|---|---|---|\r\n| WHMCS (módulo + hooks) | SDK interno | Bidirecional | Server module API + `localAPI` | Module Log + mensagem admin |\r\n| SSH / manage.sh v11.x | CLI remoto | Saída | Password ou chave SSH (phpseclib3) | Mensagens enriquecidas por sintoma |\r\n| Nextcloud OCS API | REST | Saída | Basic auth (admin) | `docker exec occ` via SSH |\r\n| DNS público | Lookup | Entrada | `dns_get_record` / Helper | Cron revalida; timeout 3 dias |\r\n\r\n**Autenticação do sistema**: credenciais do servidor WHMCS para SSH; credenciais Nextcloud armazenadas em custom fields e password do serviço WHMCS. HaRP Shared Key visível apenas no painel admin.\r\n\r\n---\r\n\r\n## 6. Requisitos Não-Funcionais\r\n\r\n| Categoria | Requisito | Meta |\r\n|---|---|---|\r\n| Compatibilidade | manage.sh e arquitetura compartilhada | v11.3+; 3 containers dedicados + 8 `shared-*` |\r\n| DNS | Registros por cliente | 1 registro A (domínio principal) |\r\n| Segurança | SSH e credenciais | sudo NOPASSWD; HaRP Shared Key só no admin |\r\n| Performance | Provisionamento | Assíncrono via cron (não bloquear checkout) |\r\n| Disponibilidade | Dependência de serviços shared | Instância depende dos 8 `shared-*` UP no host |\r\n| Compliance | LGPD | Dados de clientes em WHMCS + servidor Nextcloud; responsabilidades do provedor |\r\n| Manutenibilidade | Testes e CI | PHPUnit + lint PHP + release automatizado |\r\n\r\n---\r\n\r\n## 7. Fora de Escopo\r\n\r\n- Instalação e operação do **Nextcloud SaaS Manager** no host (`setup-shared.sh`, Traefik, containers `shared-*`)\r\n- Desenvolvimento de features do **core Nextcloud**\r\n- Billing, gateway de pagamento e faturamento (responsabilidade nativa do WHMCS)\r\n- UI multi-servidor WHMCS unificada (cada server WHMCS = um host Nextcloud)\r\n- Redesign visual do tema WHMCS além dos templates do módulo\r\n- Gestão de múltiplos datacenters / failover entre hosts\r\n\r\n\u003e Definido junto com o usuário na fase de planejamento Beesy (baseline as-is).\r\n\r\n---\r\n\r\n## 8. Premissas\r\n\r\n- O host Nextcloud já possui `manage.sh` v11.3+ instalado em `/opt/nextcloud-customers` com `setup-shared.sh` executado.\r\n- Traefik está configurado como proxy reverso com SSL Let's Encrypt.\r\n- Utilizador SSH no host possui `sudo NOPASSWD`.\r\n- WHMCS está configurado com Custom Fields obrigatórios conforme README §2.4.1.\r\n- Produto v3.1.7 é a baseline funcional; evoluções futuras passam por sprints no ROADMAP.\r\n\r\n---\r\n\r\n## 9. Dúvidas em Aberto\r\n\r\n| # | Dúvida | Impacto | Status |\r\n|---|---|---|---|\r\n| 1 | Perfil Beesy formal (`perfil` em `.cursorsession`) — criar skill PHP/WHMCS ou manter `null`? | Médio | Aberta — resolver em `/arquiteto planejar` |\r\n| 2 | Escopo de testes PHPUnit — expandir além do contrato Helper? | Médio | Aberta — definir no ROADMAP |\r\n| 3 | Multi-servidor WHMCS (vários hosts Nextcloud) — suporte futuro? | Baixo | Aberta |\r\n\r\n---\r\n\r\n## 10. Mapa do Legado\r\n\r\n### Stack Atual\r\n\r\n- **Frontend**: Smarty templates (`clientarea.tpl`, `error.tpl`)\r\n- **Backend**: PHP puro — módulo WHMCS servers (`nextcloudsaas.php`)\r\n- **Hooks**: `includes/hooks/nextcloudsaas_hooks.php`\r\n- **Libs**: `Helper.php`, `SSHManager.php`, `NextcloudAPI.php`\r\n- **Deps**: phpseclib3 (~3.0)\r\n- **Testes**: PHPUnit 10.5 (`tests/`)\r\n- **CI/CD**: GitHub Actions (Beesy robots + validation gate)\r\n\r\n### Módulos de Código\r\n\r\n| Módulo | Caminho | Responsabilidade |\r\n|---|---|---|\r\n| nextcloudsaas | `modules/servers/nextcloudsaas/` | Ciclo de vida WHMCS, botões admin/cliente, templates |\r\n| hooks | `includes/hooks/` | Cron DNS, checkout, e-mails, AcceptOrder |\r\n| tests | `tests/` | Contrato público do Helper |\r\n\r\n### Features Existentes\r\n\r\n| Feature | Manter | Modificar | Remover | Observação |\r\n|---|---|---|---|---|\r\n| Provisionamento DNS automático | x | | | Baseline v3.1.7 |\r\n| CreateAccount idempotente | x | | | v3.1.5+ |\r\n| Ciclo de vida WHMCS completo | x | | | |\r\n| Painel admin (15 botões) | x | | | |\r\n| Área do cliente | x | | | HaRP key oculta v3.1.7 |\r\n| PHPUnit Helper contract | x | | | Expandir no ROADMAP |\r\n| CI + release por tag | x | | | |\r\n\r\n### Backlog Beesy (não produto)\r\n\r\n| Item | Artefato | Comando |\r\n|---|---|---|\r\n| Arquitetura técnica | `docs/ARCHITECTURE.md` | `/arquiteto planejar` |\r\n| Roadmap e sprints | `docs/ROADMAP.md` | `/pmo plan` |\r\n| Rules/skills do projeto | `.cursor/rules/`, `.cursor/skills/` | `/arquiteto padroes` |\r\n| Session ledger | `.cursorsession.git` | `/jarvis upgrade` State 2 |\r\n\r\n---\r\n\r\n## Histórico de Revisões\r\n\r\n| Data | Versão | Alteração | Autor |\r\n|---|---|---|---|\r\n| 2026-06-18 | 1.0 | Versão inicial — baseline as-is v3.1.7 | Analista (Rock + Composer 2.5) |\r\n","ARCHITECTURE.md":"---\r\nindex:\r\n  version: \"1.0\"\r\n  doc: architecture\r\n  status: aprovada\r\n  cenario: LEGADO\r\n  product_version: \"3.1.7\"\r\n  generated: \"2026-06-18\"\r\n  baseado_em: docs/REQUIREMENTS.md\r\n  sections:\r\n    - visao-geral\r\n    - stack\r\n    - estrutura-pastas\r\n    - diagrama-modulos\r\n    - adrs\r\n    - integracoes\r\n    - seguranca\r\n    - dados\r\n    - observabilidade\r\n    - decisoes-por-modulo\r\n    - artefatos\r\n---\r\n\r\n# Arquitetura — work-nc-whmcs (Módulo Nextcloud SaaS WHMCS)\r\n\r\n\u003e Gerado em: 2026-06-18  \r\n\u003e Fase: 3 — Arquitetura de Solução  \r\n\u003e Status: Aprovada (baseline as-is v3.1.7)  \r\n\u003e Baseado em: `docs/REQUIREMENTS.md`\r\n\r\n---\r\n\r\n## 1. Visão Geral\r\n\r\n**Tipo**: Módulo monolítico WHMCS (server module + hooks) com integração remota via SSH  \r\n**Perfil Beesy**: `php-whmcs`  \r\n**Justificativa**: O produto é um **plugin de provisionamento** para WHMCS — não é uma aplicação web autônoma. Toda a UI vive no WHMCS (admin + client area); a lógica de negócio executa no contexto PHP do WHMCS e delega operações de infraestrutura ao `manage.sh` no host Nextcloud via SSH. Microserviços ou frameworks full-stack (Laravel/NestJS) seriam over-engineering e incompatíveis com o modelo de extensão WHMCS.\r\n\r\n**Cenário LEGADO**: documentação descreve o sistema **como está em produção** (v3.1.7), servindo de baseline para manutenção e sprints futuras — não propõe reescrita.\r\n\r\n### 1.1 Topologia de runtime\r\n\r\n```\r\n[Cliente / Admin] ──HTTPS──► [WHMCS + PHP]\r\n                                  │\r\n                    ┌─────────────┼─────────────┐\r\n                    │             │             │\r\n              [Hooks cron]   [Module API]   [Smarty tpl]\r\n                    │             │             │\r\n                    └─────────────┼─────────────┘\r\n                                  │ SSH (phpseclib3)\r\n                                  ▼\r\n                    [Host Nextcloud SaaS Manager]\r\n                    manage.sh + Docker + Traefik\r\n                    ├── 3 containers/\u003ccliente\u003e (app, cron, harp)\r\n                    └── 8 shared-* (db, redis, collabora, …)\r\n```\r\n\r\n---\r\n\r\n## 2. Stack Tecnológica\r\n\r\n| Camada | Tecnologia | Versão | Justificativa |\r\n|--------|-----------|--------|---------------|\r\n| Plataforma | WHMCS Server Module | — | Contrato nativo de provisionamento (`CreateAccount`, `Suspend`, etc.) |\r\n| Linguagem | PHP | 7.4+ (compat WHMCS) | Requisito do ecossistema WHMCS; sem framework adicional |\r\n| SSH | phpseclib3 | ~3.0 | PHP puro; não exige extensão `ssh2`; fallback documentado para ssh2/sshpass |\r\n| HTTP (Nextcloud) | cURL | built-in | Cliente OCS API (`NextcloudAPI`) |\r\n| Templates UI | Smarty (`.tpl`) | WHMCS | Padrão client area / error do WHMCS |\r\n| Persistência | MySQL/MariaDB (WHMCS) | — | Tabelas nativas (`tblhosting`, custom fields, orders) — módulo não define schema próprio |\r\n| Infra remota | Docker + manage.sh v11.x | v11.3+ | Orquestração real das instâncias Nextcloud |\r\n| Proxy / SSL | Traefik + Let's Encrypt | — | No host Nextcloud (fora do módulo) |\r\n| Testes | PHPUnit | 10.5 | Suite isolada em `tests/` (vendor separado do módulo) |\r\n| CI/CD | GitHub Actions (Beesy) | — | `validation-gate` (lint + PHPUnit); release por tag `vX.Y.Z` |\r\n| Observabilidade | WHMCS Module Log + Activity Log | — | `Helper::log()` + `logActivity()` nos hooks |\r\n\r\n**Fora da stack do módulo** (host Nextcloud): MariaDB compartilhado (`shared-db`), Redis (`shared-redis`), Collabora, Talk HPB, TURN — operados pelo Nextcloud SaaS Manager.\r\n\r\n---\r\n\r\n## 3. Estrutura de Pastas\r\n\r\n```\r\nwork-nc-whmcs/\r\n├── modules/servers/nextcloudsaas/     # Módulo WHMCS (deploy na instalação)\r\n│   ├── nextcloudsaas.php              # Entry point — lifecycle + admin/client commands\r\n│   ├── hooks.php                      # Loader local (se aplicável)\r\n│   ├── whmcs.json                     # Metadados + versão do módulo\r\n│   ├── lib/\r\n│   │   ├── Helper.php                 # Utilitários, DNS, parsing, constantes de arquitetura\r\n│   │   ├── SSHManager.php             # SSH + manage.sh + occ + docker\r\n│   │   └── NextcloudAPI.php           # OCS REST (users, quota, password)\r\n│   ├── templates/\r\n│   │   ├── clientarea.tpl             # Painel do assinante\r\n│   │   └── error.tpl                  # Erros na client area\r\n│   └── vendor/                        # phpseclib3 (commitado no repo)\r\n├── includes/hooks/\r\n│   └── nextcloudsaas_hooks.php        # Cron DNS, checkout, AcceptOrder, e-mails\r\n├── tests/\r\n│   ├── composer.json                  # PHPUnit isolado\r\n│   ├── bootstrap.php\r\n│   └── src/HelperTest.php             # Contrato público Helper (1 DNS, 3+8 containers)\r\n├── docs/\r\n│   ├── REQUIREMENTS.md\r\n│   ├── ARCHITECTURE.md                # Este arquivo\r\n│   └── sistema/                       # Hub de documentação\r\n└── .github/workflows/                 # CI Beesy (validation-gate, security, etc.)\r\n```\r\n\r\n**Deploy**: copiar `modules/servers/nextcloudsaas/` e `includes/hooks/nextcloudsaas_hooks.php` para a instalação WHMCS do provedor.\r\n\r\n---\r\n\r\n## 4. Diagrama de Módulos\r\n\r\n```\r\n                    ┌──────────────────────────────────────┐\r\n                    │           WHMCS Core                 │\r\n                    │  (orders, billing, cron, templates)  │\r\n                    └──────────────┬───────────────────────┘\r\n                                   │\r\n         ┌─────────────────────────┼─────────────────────────┐\r\n         │                         │                         │\r\n         ▼                         ▼                         ▼\r\n┌─────────────────┐    ┌──────────────────────┐    ┌─────────────────┐\r\n│ hooks           │    │ nextcloudsaas.php    │    │ templates       │\r\n│ (event-driven)  │    │ (module callbacks)   │    │ (Smarty UI)     │\r\n└────────┬────────┘    └──────────┬───────────┘    └─────────────────┘\r\n         │                        │\r\n         │         ┌──────────────┼──────────────┐\r\n         │         │              │              │\r\n         │         ▼              ▼              ▼\r\n         │    ┌─────────┐  ┌────────────┐  ┌──────────────┐\r\n         └───►│ Helper  │  │ SSHManager │  │ NextcloudAPI │\r\n              └─────────┘  └─────┬──────┘  └──────┬───────┘\r\n                                 │ SSH             │ HTTPS OCS\r\n                                 ▼                 ▼\r\n                          ┌─────────────────────────────┐\r\n                          │ Host: manage.sh + Docker    │\r\n                          │ /opt/nextcloud-customers/   │\r\n                          └─────────────────────────────┘\r\n```\r\n\r\n### 4.1 Assessment de Módulos\r\n\r\n| Módulo | Complexidade | Risco | Flag | Depende de | Desbloqueia | Ordem |\r\n|--------|-------------|-------|------|------------|-------------|-------|\r\n| Helper | 1 — utilitários | 1 — interno | foundation | — | todos | 1 |\r\n| SSHManager | 3 — SSH + manage.sh + docker | 3 — credenciais + remoto | complexo | Helper | lifecycle, admin cmds | 2 |\r\n| NextcloudAPI | 2 — HTTP OCS | 2 — credenciais admin | — | Helper | ChangePassword | 2 |\r\n| nextcloudsaas.php | 3 — orquestração WHMCS | 2 — billing side-effects | complexo | Helper, SSHManager, API | hooks, UI | 3 |\r\n| hooks | 2 — eventos WHMCS | 2 — cron + orders | — | Helper, module | provisionamento auto | 3 |\r\n| templates | 1 — apresentação | 1 — UX | — | nextcloudsaas.php | — | 4 |\r\n| tests | 1 — contrato | 1 — regressão | foundation | Helper | CI | transversal |\r\n\r\n**Sequência recomendada para evolução**: Helper (contratos estáveis) → SSHManager (integração crítica) → hooks (automação) → nextcloudsaas.php (orquestração) → templates (UX). Alterações em `SSHManager` exigem validação em host de staging com manage.sh real.\r\n\r\n---\r\n\r\n## 5. Decisões Técnicas (ADRs)\r\n\r\n### ADR-001: PHP puro como módulo WHMCS servers (sem Laravel/Symfony)\r\n\r\n- **Status**: Aprovada\r\n- **Contexto**: WHMCS carrega módulos de servidor como funções globais `nextcloudsaas_*` em um único arquivo PHP; não há bootstrap de framework.\r\n- **Decisão**: Manter PHP procedural/OO leve com namespace `NextcloudSaaS` nas libs.\r\n- **Alternativas consideradas**:\r\n  1. Laravel package — descartada: incompatível com lifecycle WHMCS e deploy em `modules/servers/`.\r\n  2. Microserviço sidecar HTTP — descartada: complexidade operacional; SSH direto já funciona.\r\n  3. Status quo WHMCS module — **escolhida**.\r\n- **Trade-offs aceitos**: Sem DI container, sem ORM; testabilidade limitada a unidades puras (Helper).\r\n- **Condição de reversão**: Se WHMCS oficialmente suportar módulos PSR-4 com autoload de app completa.\r\n- **Consequências**: Deploy simples (copiar pasta); testes focados em Helper e mocks de SSH.\r\n\r\n### ADR-002: phpseclib3 como cliente SSH principal\r\n\r\n- **Status**: Aprovada\r\n- **Contexto**: Nem todo servidor WHMCS tem extensão `php-ssh2`; operações `manage.sh create` podem levar minutos.\r\n- **Decisão**: phpseclib3 em `vendor/` do módulo; timeout default 300s; `sudo -n` para NOPASSWD.\r\n- **Alternativas consideradas**:\r\n  1. Extensão ssh2 nativa — descartada como única opção (disponibilidade inconsistente).\r\n  2. Exec local `ssh`/`sshpass` — mantida como fallback secundário no SSHManager.\r\n  3. phpseclib3 — **escolhida** como primary.\r\n- **Trade-offs aceitos**: Vendor commitado aumenta tamanho do repo; atualizações manuais de segurança.\r\n- **Condição de reversão**: Vulnerabilidade crítica sem patch rápido em phpseclib.\r\n- **Consequências**: `composer.json` apenas em `modules/servers/nextcloudsaas/` para runtime.\r\n\r\n### ADR-003: Delegação total de provisionamento ao manage.sh v11.x\r\n\r\n- **Status**: Aprovada\r\n- **Contexto**: Nextcloud SaaS Manager evoluiu para arquitetura compartilhada (3+8 containers); lógica Docker/Traefik não deve ser duplicada no WHMCS.\r\n- **Decisão**: Módulo chama `manage.sh create|stop|start|backup|remove|update` via SSH; lê `.credentials` e `docker-compose.yml` para metadados.\r\n- **Alternativas consideradas**:\r\n  1. Docker API direta do WHMCS — descartada: duplicaria manage.sh e quebraria em upgrades do manager.\r\n  2. API REST no host — descartada: não existe no produto atual.\r\n  3. manage.sh CLI — **escolhida**.\r\n- **Trade-offs aceitos**: Acoplamento à interface CLI do manager; breaking changes em manage.sh exigem release coordenada.\r\n- **Condição de reversão**: Manager passar a expor API estável versionada.\r\n- **Consequências**: Constantes `Helper::CONTAINER_SUFFIXES` e `SHARED_CONTAINERS` documentam contrato v11.x.\r\n\r\n### ADR-004: Provisionamento assíncrono via cron WHMCS (DNS gate)\r\n\r\n- **Status**: Aprovada\r\n- **Contexto**: Checkout não deve bloquear minutos enquanto DNS do cliente propaga; cliente precisa configurar registro A.\r\n- **Decisão**: `CreateAccount` falha gracefully se DNS incorreto; hook `AfterCronJob` revalida a cada ~5 min; timeout 3 dias com alerta ao admin.\r\n- **Alternativas consideradas**:\r\n  1. Provisionamento síncrono no checkout — descartada: UX ruim e timeouts HTTP.\r\n  2. Fila externa (Redis/Rabbit) — descartada: infra extra desnecessária; cron WHMCS já existe.\r\n  3. Cron + ModuleCreate — **escolhida**.\r\n- **Trade-offs aceitos**: Latência até 5 min após DNS correto; dependência do cron WHMCS estar ativo.\r\n- **Condição de reversão**: Volume de pedidos exigir fila dedicada com retry/backoff avançado.\r\n- **Consequências**: Botão **Provisionar Agora** (v3.1.5) como escape hatch síncrono.\r\n\r\n### ADR-005: Resolução de domínio em cascata (`Helper::getDomain`)\r\n\r\n- **Status**: Aprovada\r\n- **Contexto**: Pedidos criados pelo admin (`Add New Order`) não disparam `AfterShoppingCartCheckout`; Custom Field pode ter nomes com/sem acento.\r\n- **Decisão**: Cascata: `$params['domain']` → custom fields → query DB; hook `AcceptOrder` espelha checkout.\r\n- **Alternativas consideradas**:\r\n  1. Apenas `tblhosting.domain` — descartada: campo vazio em pedidos admin.\r\n  2. Custom Field único hardcoded — descartada: variações de encoding/nome.\r\n  3. Cascata + `nextcloudsaas_findDomainCustomField()` — **escolhida** (v3.1.7).\r\n- **Trade-offs aceitos**: Queries extras ao DB; convenção de nome do Custom Field ainda recomendada.\r\n- **Condição de reversão**: WHMCS passar domínio sempre em `$params['domain']` em todos os fluxos.\r\n- **Consequências**: Testes de integração futuros devem cobrir checkout vs admin order.\r\n\r\n### ADR-006: Perfil Beesy `php-whmcs`\r\n\r\n- **Status**: Aprovada (resolve dúvida #1 de REQUIREMENTS.md)\r\n- **Contexto**: Projeto não é Laravel nem app Node; CI já detecta `php-whmcs` no validation-gate.\r\n- **Decisão**: Registrar `perfil: php-whmcs` em `.cursorsession`; não criar skill Laravel/NestJS.\r\n- **Alternativas consideradas**:\r\n  1. `perfil: null` — descartada: perde detecção automática de stack no Beesy.\r\n  2. Skill custom `php-whmcs-module` — adiada para `/arquiteto padroes` se necessário.\r\n- **Consequências**: Sprints futuras usam validação PHP lint + PHPUnit, não Pint/PHPStan Laravel.\r\n\r\n---\r\n\r\n## 6. Integrações\r\n\r\n| Serviço | Propósito | Abordagem | Fallback |\r\n|---------|-----------|-----------|----------|\r\n| WHMCS Core | Billing, orders, custom fields, e-mail | `localAPI`, Capsule DB, hooks | Module Log + mensagem admin |\r\n| SSH / manage.sh v11.x | Lifecycle instância Nextcloud | phpseclib3 + `sudo -n` | Mensagens enriquecidas (`testConnection`) |\r\n| Nextcloud OCS API | Change password, quotas, users | cURL Basic auth | `docker exec … occ` via SSHManager |\r\n| DNS público | Validar registro A do cliente | `dns_get_record` / Helper | Cron revalida; timeout 3 dias |\r\n| Docker (remoto) | Status containers, logs, HaRP key | SSH `docker ps`, `docker exec` | Leitura de `docker-compose.yml` |\r\n\r\n### 6.1 Mapeamento WHMCS → manage.sh\r\n\r\n| Callback WHMCS | SSH / manage.sh | Notas |\r\n|----------------|-----------------|-------|\r\n| `CreateAccount` | `create` (+ fast-path `instanceExists`) | Idempotente v3.1.5+ |\r\n| `SuspendAccount` | `stop` | Containers dedicados apenas |\r\n| `UnsuspendAccount` | `start` | |\r\n| `TerminateAccount` | `backup` + `remove` | Backup obrigatório antes |\r\n| `Renew` | status + start se parado | |\r\n| `ChangePackage` | `occ` quota admin + default | |\r\n| `ChangePassword` | OCS API → occ fallback | Atualiza `.credentials` |\r\n\r\n### 6.2 Hooks WHMCS\r\n\r\n| Hook | Responsabilidade |\r\n|------|------------------|\r\n| `ShoppingCartValidateCheckout` | Valida domínio no checkout |\r\n| `AfterShoppingCartCheckout` | Copia domínio → `tblhosting.domain` |\r\n| `AcceptOrder` | Mesmo para pedidos criados pelo admin |\r\n| `AfterCronJob` | DNS pendente → `ModuleCreate` + `AcceptOrder` |\r\n| `AfterModuleCreate/Suspend/…` | Activity log / side-effects pós-ação |\r\n| `ClientAreaPageProductDetails` | Injeta dados na client area |\r\n| `ClientAreaHeadOutput` | CSS/JS customizado |\r\n\r\n---\r\n\r\n## 7. Segurança\r\n\r\n### 7.1 Classificação de Dados\r\n\r\n| Dado | Sensibilidade | Módulo responsável | Proteção |\r\n|------|--------------|-------------------|----------|\r\n| Senha SSH do servidor WHMCS | Alta | SSHManager | Armazenada criptografada pelo WHMCS (server password) |\r\n| Senha admin Nextcloud | Alta | nextcloudsaas.php, hooks | Custom fields + `tblhosting.password`; e-mail ao cliente |\r\n| HaRP Shared Key (`HP_SHARED_KEY`) | Alta | SSHManager | **Somente painel admin** (v3.1.7); lida de compose/env |\r\n| Domínio do cliente | Média | Helper, hooks | Validação regex; sem PII direto |\r\n| Logs manage.sh | Média | SSHManager | Module Log WHMCS; não expor ao cliente |\r\n| URLs shared-* (Collabora, TURN) | Baixa | Helper | Hostnames globais; não são secrets |\r\n\r\n### 7.2 Fronteiras de Confiança\r\n\r\n| Origem | Destino | Protocolo | Auth | Validação | Rate limit |\r\n|--------|---------|-----------|------|-----------|------------|\r\n| Internet | WHMCS | HTTPS | Sessão WHMCS | WHMCS core | WHMCS |\r\n| WHMCS PHP | Host Nextcloud | SSH:22 | Password ou chave | Comandos allowlist (`manage.sh`) | Timeout 300s |\r\n| WHMCS PHP | Nextcloud instância | HTTPS OCS | Basic (admin) | SSL verify (configurável) | cURL timeout 30s |\r\n| WHMCS PHP | DNS resolver | UDP/TCP 53 | — | `isValidDomain` + A record check | Cron 5 min |\r\n| Admin WHMCS | Module Commands | HTTPS | Admin ACL WHMCS | `nextcloudsaas_*` callbacks | — |\r\n\r\n### 7.3 Top 3 Vetores de Ataque\r\n\r\n1. **Compromisso credencial SSH no WHMCS** → Impacto: controle total do host Nextcloud → Mitigação: chave SSH dedicada com comando restrito; NOPASSWD mínimo; auditoria Module Log.\r\n2. **Injeção em comandos SSH** → Impacto: RCE no host → Mitigação: `clientName` derivado de regras WHMCS; sem concatenação livre de input do cliente em shell.\r\n3. **Exposição de credenciais na client area** → Impacto: vazamento HaRP/admin → Mitigação: v3.1.7 remove HaRP do cliente; templates sem URLs internas shared-*.\r\n\r\n### 7.4 Requisitos de Segurança por Módulo\r\n\r\n| Módulo | Auth requerido? | Rate limit? | Input validation crítico? | Dados sensíveis? |\r\n|--------|----------------|-------------|--------------------------|------------------|\r\n| hooks | WHMCS interno | Cron natural | Domínio (checkout) | E-mail com senha |\r\n| nextcloudsaas.php | Admin/client WHMCS | — | `$params`, custom fields | Senhas, credenciais |\r\n| SSHManager | Credencial servidor | Timeout | `clientName`, comandos | SSH key, output `.credentials` |\r\n| NextcloudAPI | Admin NC | HTTP timeout | Endpoints OCS | Admin password |\r\n| Helper | — | — | Domínio, DNS | Parsing `.credentials` |\r\n| templates | Client session | — | Escape Smarty | Não exibir secrets internos |\r\n\r\n---\r\n\r\n## 8. Banco de Dados e Infraestrutura de Dados\r\n\r\n\u003e Gerado pelo Arquiteto de Dados (Fase 4) — detalhamento completo em `docs/DATABASE.md`.\r\n\r\n### 8.1 BD Principal\r\n\r\n- **Escolhido**: MariaDB / MySQL (banco nativo do WHMCS)\r\n- **Justificativa**: WHMCS exige MySQL/MariaDB; módulo server padrão consome `tblhosting`, custom fields e `localAPI` sem schema próprio. Projeto LEGADO — manter engine existente (database-recommendation: *legado MySQL → manter*).\r\n\r\n### 8.2 Tier de Infraestrutura\r\n\r\n- **Tier**: 1 — Single Node\r\n- **Justificativa**: Carga típica de hoster WHMCS (centenas–milhares de serviços); módulo adiciona writes esporádicos no provisionamento e leituras no cron DNS (~5 min). HA do banco WHMCS é decisão de infra do provedor, não do módulo.\r\n- **Componentes**:\r\n\r\n| Componente | Tecnologia | Config |\r\n|------------|-----------|--------|\r\n| BD Primary (WHMCS) | MariaDB 10.6+ / MySQL 8 | Single node; backup mysqldump/WHMCS |\r\n| BD Nextcloud (remoto) | MariaDB `shared-db` | Operado pelo manager v11.x — fora do módulo |\r\n| Connection Pool | Built-in WHMCS / Capsule | Sem pool customizado no módulo |\r\n| Cache | — (módulo) | `shared-redis` apenas no host NC |\r\n| Failover | Manual (Tier 1) | Replicação MariaDB opcional no hoster |\r\n\r\n### 8.3 Composição\r\n\r\n- **Nível**: 1 — Complementar externo\r\n- **Bancos / stores complementares**:\r\n\r\n| Store | Propósito | Padrão de sync |\r\n|-------|-----------|----------------|\r\n| Filesystem SSH (`/opt/nextcloud-customers/`) | Credenciais, compose, volumes | Escrito por `manage.sh`; lido via SSHManager |\r\n| MariaDB `shared-db` (remoto) | Dados Nextcloud multi-tenant | Gerido pelo manager — módulo não acessa SQL direto |\r\n| Module Log WHMCS | Diagnóstico técnico | Append via `Helper::log()` |\r\n\r\n- **Justificativa**: Polyglot ou CQRS seria over-engineering; estado de negócio já cabe no WHMCS + artefatos remotos.\r\n\r\n### 8.4 Segurança de Dados\r\n\r\n- **Conexão app-BD**: TLS recomendado na instalação WHMCS (configuração do hoster)\r\n- **Credenciais**: Senhas em `tblhosting` / `tblservers` criptografadas pelo WHMCS; SSH no server record\r\n- **Encryption at rest**: Responsabilidade do provedor (volume WHMCS + host Nextcloud)\r\n- **Backups**: Backup WHMCS (inclui custom fields + orders) + `manage.sh backup` antes de terminate\r\n\r\n---\r\n\r\n## 9. Observabilidade\r\n\r\n| Canal | O quê | Onde |\r\n|-------|-------|------|\r\n| Module Log | Ações SSH, fallbacks HaRP, erros API | WHMCS → Utilities → Logs → Module Log |\r\n| Activity Log | Orders aceitos, DNS timeout, provisionamento | WHMCS Activity Log |\r\n| Admin UI | Ver Logs, Ver Logs Talk Recording, Verificar Estado | Botões customizados |\r\n| CI | `php -l`, PHPUnit Helper | GitHub Actions `validation-gate` |\r\n| Métricas formais | — | **Não implementado** — candidato ROADMAP (Sentry, etc.) |\r\n\r\n**Tracing distribuído**: não aplicável (monólito WHMCS + SSH síncrono).\r\n\r\n---\r\n\r\n## 10. Decisões Técnicas por Módulo\r\n\r\n### Helper (`lib/Helper.php`)\r\n\r\n**Anti-patterns a evitar:**\r\n- Hardcodar hostnames Collabora/TURN por cliente — arquitetura v11.x usa globais.\r\n- Assumir 10 containers por instância — contrato atual é 3 (`CONTAINER_SUFFIXES`).\r\n\r\n**Decisões de implementação:**\r\n- Constantes `CONTAINER_SUFFIXES` e `SHARED_CONTAINERS` são contrato público testado em PHPUnit.\r\n- `getDomain()` deve permanecer pura o suficiente para testes sem WHMCS bootstrapped.\r\n- `parseCredentials()` tolerante a formatos v11.x (seção HaRP opcional).\r\n\r\n**Edge cases conhecidos:**\r\n- Custom Field sem acento → `nextcloudsaas_findDomainCustomField()` em hooks (v3.1.7).\r\n- Domínio com `https://` ou trailing slash → normalização em `getDomain()`.\r\n\r\n**Integrações críticas:**\r\n- Consumido por SSHManager, nextcloudsaas.php e hooks.\r\n\r\n---\r\n\r\n### SSHManager (`lib/SSHManager.php`)\r\n\r\n**Anti-patterns a evitar:**\r\n- Executar `manage.sh create` sem verificar `instanceExists()` — causa duplicação ou erro opaco.\r\n- Considerar `.env` sozinho como instância completa — v3.1.7 exige `.credentials` + container `app`.\r\n\r\n**Decisões de implementação:**\r\n- `fromWhmcsParams()` centraliza leitura de server/product config.\r\n- `runManage()` encapsula `sudo -n` + caminho do script.\r\n- `getHarpSharedKey()` cascata: grep compose → `docker exec printenv`.\r\n- Porta SSH: fallback 22 se WHMCS enviar 0/vazio.\r\n\r\n**Edge cases conhecidos:**\r\n- Ubuntu 24.04 `PasswordAuthentication no` → mensagem guiada em `testConnection()`.\r\n- Provisionamento parcial (dir sem `.credentials`) → flag `partial` em `instanceExists()`.\r\n\r\n**Integrações críticas:**\r\n- Único ponto de saída para host Nextcloud; mudanças aqui afetam todo lifecycle.\r\n\r\n---\r\n\r\n### NextcloudAPI (`lib/NextcloudAPI.php`)\r\n\r\n**Anti-patterns a evitar:**\r\n- Usar API OCS para operações que manage.sh/occ fazem melhor em batch — preferir SSH para quotas em ChangePackage.\r\n\r\n**Decisões de implementação:**\r\n- cURL com `OCS-APIRequest: true` e `format=json`.\r\n- ChangePassword: API primeiro, `occ user:resetpassword` como fallback.\r\n\r\n**Edge cases conhecidos:**\r\n- SSL ainda não provisionado (DNS recém-configurado) → fallback SSH.\r\n\r\n---\r\n\r\n### nextcloudsaas.php (orquestrador)\r\n\r\n**Anti-patterns a evitar:**\r\n- Retornar erro fatal quando instância já existe — fast-path deve reutilizar credenciais (v3.1.5).\r\n- Deixar Order em Pending após CreateAccount bem-sucedido — chamar `nextcloudsaas_acceptOrderForService()`.\r\n\r\n**Decisões de implementação:**\r\n- Funções globais `nextcloudsaas_*` seguem contrato WHMCS (não renomear).\r\n- `AdminCustomButtonArray` / `ClientAreaCustomButtonArray` registram botões sem lógica pesada nos arrays.\r\n- `CreateAccount` idempotente + logging extensivo.\r\n\r\n**Edge cases conhecidos:**\r\n- Produto FREE ($0) com autosetup desligado → AcceptOrder no fluxo síncrono.\r\n- Falha de quota no fast-path → warning log, não abort (v3.1.5).\r\n\r\n---\r\n\r\n### hooks (`includes/hooks/nextcloudsaas_hooks.php`)\r\n\r\n**Anti-patterns a evitar:**\r\n- Duplicar lógica de domínio — usar `Helper::getDomain` e `nextcloudsaas_findDomainCustomField`.\r\n- Enviar e-mail com URLs de infra global Collabora/TURN ao cliente — removido v3.1.3.\r\n\r\n**Decisões de implementação:**\r\n- `AfterCronJob` processa serviços pendentes com DNS válido.\r\n- `nextcloudsaas_cronProcessPendingService()` isolada para testabilidade futura.\r\n- E-mail HTML via funções builder dedicadas.\r\n\r\n**Edge cases conhecidos:**\r\n- DNS incorreto por 3 dias → `nextcloudsaas_notifyAdminDnsTimeout`.\r\n- Múltiplos serviços pendentes no mesmo cron → processar sequencialmente (evitar thundering herd SSH).\r\n\r\n---\r\n\r\n### templates (`templates/*.tpl`)\r\n\r\n**Anti-patterns a evitar:**\r\n- Exibir HaRP Shared Key ao assinante (v3.1.7).\r\n- Listar 10 containers — UI deve refletir 3 dedicados.\r\n\r\n**Decisões de implementação:**\r\n- Variáveis injetadas por `nextcloudsaas_ClientArea()` — lista explícita (sem vazar internals).\r\n- `error.tpl` para falhas de conexão/API com mensagem amigável.\r\n\r\n---\r\n\r\n### tests (`tests/`)\r\n\r\n**Anti-patterns a evitar:**\r\n- Acoplar testes ao vendor do módulo — composer separado em `tests/`.\r\n- Mockar SSH em testes unitários do Helper — Helper deve permanecer testável sem rede.\r\n\r\n**Decisões de implementação:**\r\n- HelperTest valida contrato arquitetural (1 DNS, 3 containers, 8 shared).\r\n- Expansão futura: SSHManager com stub de SSH2 (ROADMAP).\r\n\r\n---\r\n\r\n## 11. Artefatos Gerados\r\n\r\n- [x] `docs/ARCHITECTURE.md` (este arquivo — `/arquiteto planejar`)\r\n- [x] Seção \"Decisões Técnicas por Módulo\" (alimenta `/pmo plan` → ROADMAP.md)\r\n- [x] Perfil Beesy `php-whmcs` (ADR-006)\r\n- [x] Secão 8 detalhada + `docs/DATABASE.md` (`/arquiteto dados`)\r\n- [ ] `.cursor/rules/*.mdc` (`/arquiteto padroes`)\r\n- [ ] `docs/ROADMAP.md` (`/pmo plan`)\r\n- [ ] `.github/workflows` projeto-específico além dos robots Beesy (`/devops planejar`)\r\n\r\n---\r\n\r\n## Histórico de Revisões\r\n\r\n| Data | Versão | Alteração | Autor |\r\n|------|--------|-----------|-------|\r\n| 2026-06-18 | 1.0 | Proposta inicial — baseline as-is v3.1.7 | Arquiteto de Soluções (Beesy) |\r\n","DATABASE.md":"---\r\nindex:\r\n  version: \"1.0\"\r\n  doc: database\r\n  status: aprovado\r\n  cenario: LEGADO\r\n  product_version: \"3.1.7\"\r\n  generated: \"2026-06-18\"\r\n  baseado_em:\r\n    - docs/REQUIREMENTS.md\r\n    - docs/ARCHITECTURE.md\r\n---\r\n\r\n# Database — work-nc-whmcs (Módulo Nextcloud SaaS WHMCS)\r\n\r\n\u003e Gerado em: 2026-06-18  \r\n\u003e Fase: 4 — Arquitetura de Dados  \r\n\u003e Cenário: LEGADO (sem migrations próprias — consumo do schema WHMCS + artefatos remotos)\r\n\r\n---\r\n\r\n## 1. Decisões\r\n\r\n| Decisão | Escolha | Alternativa descartada | Motivo |\r\n|---------|---------|------------------------|--------|\r\n| BD principal (WHMCS) | **MariaDB / MySQL** (nativo WHMCS) | PostgreSQL, SQLite | WHMCS exige MySQL/MariaDB; módulo não controla engine |\r\n| Tier de infra (WHMCS) | **Tier 1 — Single Node** | Tier 2 (replicas), Tier 3 (sharding) | Volume típico de hoster WHMCS; módulo não adiciona carga OLAP |\r\n| Composição | **Nível 1 — Complementar externo** | Nível 2 CQRS, Nível 3 polyglot | Estado no WHMCS DB + filesystem SSH remoto; sem cache/fila própria no módulo |\r\n| Schema do módulo | **Zero migrations** | Tabelas `mod_nextcloudsaas_*` | Padrão WHMCS server modules; reuso de `tblhosting`, custom fields, Module Log |\r\n| BD Nextcloud (remoto) | **MariaDB `shared-db`** (manager v11.x) | BD por cliente | Fora do escopo do módulo; operado pelo Nextcloud SaaS Manager |\r\n\r\n**Recomendação aplicada** (database-recommendation §1): *Projeto legado MySQL → manter MariaDB* + equipe PHP/WHMCS.\r\n\r\n---\r\n\r\n## 2. Modelo de Dados Lógico\r\n\r\nO módulo não define entidades próprias em SQL. O modelo abaixo mapeia **conceitos de negócio** → **artefatos WHMCS / remotos**.\r\n\r\n### 2.1 Entidades\r\n\r\n| Entidade lógica | Persistência | Descrição | Relações principais |\r\n|-----------------|-------------|-----------|---------------------|\r\n| Serviço Nextcloud | `tblhosting` | Assinatura do cliente (domínio, status, credenciais) | `server` → `tblservers`; `orderid` → `tblorders` |\r\n| Servidor de hospedagem | `tblservers` | Host SSH + IP para DNS e provisionamento | 1:N serviços (`tblhosting.server`) |\r\n| Produto / plano | `tblproducts` + `configoption1..9` | Quota, max users, SSH key path, prefixo cliente, hostnames globais | 1:N serviços |\r\n| Domínio da instância | Custom Field + `tblhosting.domain` | Hostname público do Nextcloud | Copiado por hooks checkout/AcceptOrder |\r\n| Metadados DNS/cron | `tblhosting.notes` | Marcadores `[NextcloudSaaS]` para timeout e auto-provision | Texto append-only |\r\n| Credenciais NC | `tblhosting.password` + Custom Fields | URL, client name, senha admin (criptografada WHMCS) | Preenchido no CreateAccount |\r\n| Pedido | `tblorders` | Ciclo Pending → Active pós-provisionamento | Ligado via `tblhosting.orderid` |\r\n| Cliente WHMCS | `tblclients` | E-mail para provisionamento e alertas DNS | 1:N serviços |\r\n| Instância remota | Filesystem SSH | `.credentials`, `.env`, `docker-compose.yml`, volumes | 1:1 com serviço provisionado |\r\n| Log técnico | Module Log WHMCS | Diagnóstico SSH/API (`Helper::log`) | Por `serviceid` implícito na mensagem |\r\n\r\n### 2.2 Diagrama ER (lógico — WHMCS + remoto)\r\n\r\n```\r\n┌─────────────┐       ┌──────────────┐       ┌─────────────┐\r\n│ tblclients  │ 1───N │  tblhosting  │ N───1 │ tblservers  │\r\n└─────────────┘       └──────┬───────┘       └─────────────┘\r\n                             │\r\n              ┌──────────────┼──────────────┐\r\n              │              │              │\r\n              ▼              ▼              ▼\r\n      ┌──────────────┐ ┌───────────┐ ┌─────────────────────┐\r\n      │ tblorders    │ │tblproducts│ │tblcustomfieldsvalues│\r\n      │ (status)     │ │configopt* │ │ + tblcustomfields   │\r\n      └──────────────┘ └───────────┘ └─────────────────────┘\r\n\r\n                             │ SSH (provisionado)\r\n                             ▼\r\n              ┌──────────────────────────────────┐\r\n              │ /opt/nextcloud-customers/\u003cid\u003e/   │\r\n              │  .credentials  .env  compose     │\r\n              └──────────────────────────────────┘\r\n                             │\r\n                             ▼\r\n              ┌──────────────────────────────────┐\r\n              │ shared-db (MariaDB) — manager    │  ← fora do WHMCS\r\n              └──────────────────────────────────┘\r\n```\r\n\r\n### 2.3 Tabelas WHMCS — colunas utilizadas\r\n\r\n#### `tblhosting`\r\n\r\n| Coluna | Escrita | Leitura | Notas |\r\n|--------|---------|---------|-------|\r\n| `id` | — | ✓ | `serviceid` em todo o módulo |\r\n| `userid` | — | ✓ | Cliente para e-mails |\r\n| `orderid` | — | ✓ | `acceptOrderForService()` |\r\n| `packageid` / `pid` | — | ✓ | Produto + custom fields |\r\n| `server` | — | ✓ | FK → `tblservers` |\r\n| `domain` | ✓ hooks, CreateAccount | ✓ | Fonte primária após sync do Custom Field |\r\n| `domainstatus` | ✓ cron, CreateAccount | ✓ | `Pending`, `Active`, etc. |\r\n| `username` | ✓ hooks | ✓ | Hardcoded `admin` para Nextcloud |\r\n| `password` | ✓ CreateAccount, ChangePassword | ✓ | Senha admin NC (encrypted WHMCS) |\r\n| `notes` | ✓ hooks cron | ✓ | Metadados `[NextcloudSaaS]` (ver §2.4) |\r\n\r\n#### `tblservers`\r\n\r\n| Coluna | Uso |\r\n|--------|-----|\r\n| `id` | Referenciado por `tblhosting.server` |\r\n| `type` | Filtro `nextcloudsaas` em queries de IP |\r\n| `ipaddress`, `hostname` | Validação DNS e SSH host |\r\n| `username`, `password` | Credenciais SSH (password encrypted) |\r\n| `accesshash` | Fallback para caminho chave SSH |\r\n| `port` | Porta SSH (fallback 22 no módulo) |\r\n| `disabled` | Servidores ativos apenas |\r\n\r\n#### `tblcustomfields` / `tblcustomfieldsvalues`\r\n\r\n| Custom Field (nome canônico) | Obrigatório | Populado por | Finalidade |\r\n|------------------------------|-------------|--------------|------------|\r\n| **Domínio da Instância** | Sim | Cliente checkout / admin | Input; copiado para `domain` |\r\n| **Client Name** | Não | CreateAccount | Identificador `manage.sh` |\r\n| **Nextcloud URL** | Não | CreateAccount | URL pública pós-provisionamento |\r\n| **Collabora URL** | Não | Legado v2.x (opcional) | Pode existir no produto; UI cliente removida v3.1.3 |\r\n| **Signaling URL** | Não | Legado v2.x (opcional) | Idem |\r\n\r\n**Lookup robusto** (v3.1.7): `nextcloudsaas_findDomainCustomField($productId)` — cascata acentos → sem acentos → `LOWER(fieldname) LIKE '%dom%' AND '%inst%'`.\r\n\r\n#### `tblproducts` — config options do módulo\r\n\r\n| Config option | Campo | Default típico | Uso |\r\n|---------------|-------|----------------|-----|\r\n| 1 | Quota (GB) | 10 | ChangePackage, create |\r\n| 2 | Máx. utilizadores | 5 | Informativo / manage.sh |\r\n| 3 | Collabora | on | Sempre on na v11.x |\r\n| 4 | Talk HPB | on | Sempre on na v11.x |\r\n| 5 | Caminho chave SSH | vazio | `SSHManager` |\r\n| 6 | Prefixo cliente | vazio | Nome no `manage.sh` |\r\n| 7–9 | Hostnames globais | vazio | Override Collabora/Signaling/TURN |\r\n\r\n### 2.4 Metadados em `tblhosting.notes`\r\n\r\nFormato texto livre com marcadores append-only:\r\n\r\n| Marcador | Quando gravado | Uso |\r\n|----------|----------------|-----|\r\n| `[NextcloudSaaS] dns_check_start=YYYY-MM-DD HH:MM:SS` | Checkout / início verificação DNS | Calcular timeout 3 dias |\r\n| `[NextcloudSaaS] dns_expired=true` | DNS incorreto após 3 dias | Parar cron; notificar admin |\r\n| `[NextcloudSaaS] auto_provisioned=YYYY-MM-DD HH:MM:SS` | Provisionamento via cron | Auditoria |\r\n\r\n### 2.5 Dados remotos (host Nextcloud)\r\n\r\n| Artefato | Caminho | Formato | Consumido por |\r\n|----------|---------|---------|---------------|\r\n| Diretório instância | `/opt/nextcloud-customers/\u003cclientName\u003e/` | FS | SSHManager |\r\n| Credenciais parseadas | `.credentials` | INI/seções | `Helper::parseCredentials()` |\r\n| Variáveis ambiente | `.env` | KEY=VAL | `getEnv()`, fallback credenciais |\r\n| HaRP shared key | `docker-compose.yml` / container env | `HP_SHARED_KEY=` | `getHarpSharedKey()` |\r\n| Uso disco | volumes/data | `du -sh` | ClientArea, UsageUpdate |\r\n\r\n### 2.6 Convenções — escopo LEGADO WHMCS\r\n\r\nAs convenções Beesy (`database-conventions.md`: UUID PK, soft delete, timestamps) **não se aplicam** às tabelas core WHMCS — são schema proprietário WHMCS.\r\n\r\nPara evoluções futuras **se** o projeto criar tabelas próprias:\r\n\r\n- Prefixo sugerido: `mod_nextcloudsaas_`\r\n- PK: `INT UNSIGNED AUTO_INCREMENT` (padrão WHMCS) ou UUID apenas se integração externa exigir\r\n- Sempre `created_at` / `updated_at` em tabelas novas\r\n- Nunca duplicar dados já em `tblhosting` ou custom fields\r\n\r\n---\r\n\r\n## 3. Infraestrutura de Dados\r\n\r\n### 3.1 Topologia (Tier 1 — WHMCS)\r\n\r\n```\r\n┌─────────────────────────────────────┐\r\n│  Servidor WHMCS                     │\r\n│  ┌───────────────────────────────┐  │\r\n│  │ MariaDB/MySQL (single node)   │  │\r\n│  │  tblhosting, tblservers, …    │  │\r\n│  └───────────────────────────────┘  │\r\n│  PHP + módulo nextcloudsaas         │\r\n└──────────────┬──────────────────────┘\r\n               │ SSH\r\n               ▼\r\n┌─────────────────────────────────────┐\r\n│  Host Nextcloud SaaS Manager        │\r\n│  Docker + shared-db (MariaDB)       │\r\n│  /opt/nextcloud-customers/          │\r\n└─────────────────────────────────────┘\r\n```\r\n\r\n### 3.2 Connection pooling\r\n\r\n| Camada | Mecanismo | Notas |\r\n|--------|-----------|-------|\r\n| WHMCS → MySQL | Pool interno WHMCS / Capsule | Módulo usa `Capsule::table()` — sem pool customizado |\r\n| Módulo → remoto | N/A (SSH, não JDBC) | Uma conexão SSH por operação típica |\r\n| Nextcloud app → DB | `shared-db` Docker network | Gerido pelo manager — fora do módulo |\r\n\r\n### 3.3 Cache\r\n\r\n| Cache | Existe? | Notas |\r\n|-------|---------|-------|\r\n| Redis no módulo WHMCS | Não | WHMCS pode usar Redis opcionalmente — transparente ao módulo |\r\n| Redis Nextcloud (`shared-redis`) | Sim (remoto) | Cache de arquivos NC — não acessado pelo módulo WHMCS |\r\n| Cache DNS | Não | `dns_get_record` a cada verificação cron |\r\n\r\n### 3.4 Read/Write splitting\r\n\r\nNão aplicável — Tier 1, workload WHMCS padrão. Replicação MariaDB é decisão de infra do provedor, não do módulo.\r\n\r\n---\r\n\r\n## 4. Segurança\r\n\r\n| Item | Config / prática |\r\n|------|------------------|\r\n| Usuário BD WHMCS | Usuário dedicado WHMCS (instalação padrão) — módulo herda permissões |\r\n| Senhas em repouso | WHMCS encrypt (`tblhosting.password`, `tblservers.password`); `localAPI('DecryptPassword')` só no envio de e-mail |\r\n| TLS app-BD | Recomendado na instalação WHMCS (MySQL SSL) — configuração do hoster |\r\n| Encryption at rest | Responsabilidade do provedor (volume WHMCS + backups) |\r\n| PII | E-mail cliente (`tblclients`), domínio, credenciais NC — LGPD: responsabilidade do provedor |\r\n| Backups WHMCS | mysqldump / backup WHMCS — **deve incluir custom fields e orders** |\r\n| Backups Nextcloud | `manage.sh backup` antes de terminate; backups host — fora do módulo |\r\n| PITR | Opcional no MariaDB do hoster — não requisito do módulo |\r\n| Teste de restore | Procedimento operacional do provedor |\r\n| Module Log | Não logar senhas em claro; `Helper::log()` para metadados técnicos |\r\n\r\n---\r\n\r\n## 5. Operações de Dados (sem migrations)\r\n\r\n### 5.1 Fluxos de escrita\r\n\r\n| Evento | Tabelas/campos afetados |\r\n|--------|-------------------------|\r\n| Checkout cliente | `tblcustomfieldsvalues`, `tblhosting.domain`, `tblhosting.notes` |\r\n| Accept Order (admin) | Idem |\r\n| CreateAccount sucesso | `tblhosting.password`, custom fields, `domainstatus`, `tblorders.status` |\r\n| Cron DNS OK | `ModuleCreate` → mesmas + `notes` auto_provisioned |\r\n| ChangePassword | `tblhosting.password`, `.credentials` remoto |\r\n| DNS timeout 3d | `notes` dns_expired, e-mail admin |\r\n\r\n### 5.2 APIs de acesso no código\r\n\r\n| Padrão | Onde | Uso |\r\n|--------|------|-----|\r\n| `Capsule::table()` | Helper, hooks, nextcloudsaas.php | Queries diretas |\r\n| `localAPI()` | hooks, nextcloudsaas.php | ModuleCreate, AcceptOrder, UpdateClientProduct, SendEmail |\r\n| `Helper::getDomain()` | CreateAccount, validações | Leitura unificada domínio |\r\n\r\n### 5.3 Sprint 1 — implicações\r\n\r\n**Não há migration inicial** neste projeto LEGADO. Sprints de evolução devem:\r\n\r\n1. Preservar compatibilidade com custom fields existentes em produção\r\n2. Evitar novas colunas em tabelas WHMCS core\r\n3. Se precisar de estado extra: preferir `notes` estruturado ou nova tabela `mod_*` via migration WHMCS addon (decisão futura no ROADMAP)\r\n\r\n---\r\n\r\n## 6. Queries de referência (diagnóstico)\r\n\r\n```sql\r\n-- Serviços Nextcloud pendentes (simplificado — espelha lógica do cron)\r\nSELECT h.id, h.domain, h.domainstatus, h.notes, s.ipaddress\r\nFROM tblhosting h\r\nJOIN tblproducts p ON p.id = h.packageid\r\nJOIN tblservers s ON s.id = h.server\r\nWHERE p.servertype = 'nextcloudsaas'\r\n  AND h.domainstatus = 'Pending';\r\n\r\n-- Custom field domínio para um serviço\r\nSELECT cf.fieldname, cfv.value\r\nFROM tblcustomfields cf\r\nJOIN tblcustomfieldsvalues cfv ON cfv.fieldid = cf.id\r\nWHERE cf.type = 'product'\r\n  AND cf.relid = :productId\r\n  AND cfv.relid = :serviceId;\r\n```\r\n\r\n---\r\n\r\n## Histórico de Revisões\r\n\r\n| Data | Versão | Alteração | Autor |\r\n|------|--------|-----------|-------|\r\n| 2026-06-18 | 1.0 | Baseline LEGADO — WHMCS MariaDB + dados remotos SSH | Arquiteto de Dados (Beesy) |\r\n","ROADMAP.md":"---\r\nindex:\r\n  version: \"1.0\"\r\n  doc: roadmap\r\n  status: aprovado\r\n  cenario: LEGADO\r\n  generated: \"2026-06-18\"\r\n  sprints:\r\n    - N1\r\n    - N2\r\n---\r\n\r\n# Roadmap Técnico — work-nc-whmcs\r\n\r\n\u003e Gerado em: 2026-06-18  \r\n\u003e Fase: Planejamento técnico (melhorias LEGADO v3.1.7)  \r\n\u003e Baseado em: REQUIREMENTS.md + ARCHITECTURE.md + DATABASE.md + integration-contracts.yaml  \r\n\u003e Status: Em execução\r\n\r\n---\r\n\r\n## Resumo\r\n\r\n| Métrica | Valor |\r\n|---------|-------|\r\n| Total de tarefas | 6 |\r\n| Total de sprints | 2 |\r\n| Tarefas P | 3 |\r\n| Tarefas M | 3 |\r\n| Tarefas G | 0 |\r\n\r\n---\r\n\r\n## Índice de Sprints\r\n\r\n| Sprint | Categoria | Gate (resumo) | Status | Tasks | Módulos | Resumo | Linhas |\r\n|--------|-----------|---------------|--------|-------|---------|--------|--------|\r\n| N1 | N | PHPUnit verde com ≥15 casos Helper | concluída | 3 | tests, Helper | Expandir testes Helper | 40-95 |\r\n| N2 | N | USAGE/README alinhados v3.1.7 | concluída | 3 | docs | Sync documentação operacional | 98-130 |\r\n\r\n---\r\n\r\n## Estratégia de Auditoria\r\n\r\n\u003e Modo: Manual\r\n\r\n| Sprint | Review | Motivo |\r\n|--------|--------|--------|\r\n| N1 | skip | Testes + contrato Helper |\r\n| N2 | skip | Docs only |\r\n\r\n---\r\n\r\n## Grafo de Dependências\r\n\r\n```\r\n[Helper tests N1] ──► [Docs sync N2]\r\n```\r\n\r\n---\r\n\r\n## Sprint N1 — PHPUnit Helper expansion\r\n\r\n\u003e Categoria: N  \r\n\u003e Gate: `cd tests && ./vendor/bin/phpunit` passa com ≥15 testes; cobre getDomain, isValidDomain, parseCredentials, parseManageOutput, getContainerNames  \r\n\u003e review: skip  \r\n\u003e Status: em execução\r\n\r\n| Status | Tamanho | Tarefa | Skill/Command | Depende de |\r\n|--------|---------|--------|---------------|------------|\r\n| [x] | M | N1.1 — Testes isValidDomain + getDomain (params path) | `php-whmcs-module` | — |\r\n| [x] | M | N1.2 — Testes parseCredentials + parseManageOutput | `php-whmcs-module` | — |\r\n| [x] | P | N1.3 — Testes getContainerNames + formatQuota | `php-whmcs-module` | — |\r\n\r\n**Notas técnicas N1.1:**\r\n\r\n\u003cdetails\u003e\r\n\u003csummary\u003eN1.1 — getDomain e isValidDomain\u003c/summary\u003e\r\n\r\n- **Arquivo(s)**: `tests/src/HelperTest.php`\r\n- **Abordagem**: Testar `isValidDomain` com válidos/inválidos; `getDomain` com `$params['domain']` e `$params['customfields']` sem DB\r\n- **Edge cases**: domínio com https://, www., trailing slash; custom field com acento\r\n- **executor_prompt**: Add PHPUnit tests for Helper::isValidDomain and Helper::getDomain using $params array only (no Capsule). Cover domain cleaning and customfields fallback keys containing dom+inst.\r\n\u003c/details\u003e\r\n\r\n**Notas técnicas N1.2:**\r\n\r\n\u003cdetails\u003e\r\n\u003csummary\u003eN1.2 — parseCredentials e parseManageOutput\u003c/summary\u003e\r\n\r\n- **Arquivo(s)**: `te
