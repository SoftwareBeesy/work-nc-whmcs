v11.x.\r\n- `README.md` §3.1: Suspend/Unsuspend referem 3 containers dedicados (não 10).\r\n\r\n## v3.1.7 (2026-05-04)\r\n\r\n### Removido\r\n- **Seção HaRP (AppAPI) no painel do cliente (`clientarea.tpl`).** A linha *\"Shared Key: ...\"* foi removida do painel do assinante — é credencial interna do AppAPI/HaRP daemon (não pertence ao usuário final), seguindo o mesmo critério aplicado a Collabora/MariaDB/TURN/Signaling em v3.1.3. O container dedicado `\u003ccliente\u003e-harp` continua operacional. **O painel admin** (botão **Ver Credenciais**) **continua exibindo** a Shared Key normalmente, com o fallback robusto introduzido em v3.1.6.\r\n- `harpSharedKey` removido do array de `templateVars` em `nextcloudsaas_ClientArea()` e o fallback `getHarpSharedKey()` deixou de ser invocado a partir do painel cliente (continua acessível ao admin via `viewCredentials`).\r\n\r\n### Corrigido\r\n- **Robustez do lookup do Custom Field \"Domínio da Instância\".** As três queries `LIKE '%Domínio%Instância%'` espalhadas em `nextcloudsaas_hooks.php` (validador de checkout, `AfterShoppingCartCheckout` e `AcceptOrder`) foram refatoradas para usar uma nova função helper `nextcloudsaas_findDomainCustomField($productId)` com cascata de três tentativas: (1) acentos UTF-8, (2) sem acentos, (3) `whereRaw(\"LOWER(fieldname) LIKE '%dom%' AND LOWER(fieldname) LIKE '%inst%'\")` — case-insensitive e independente de encoding. Resolve o caso em que o admin nomeia o Custom Field sem acentos, com letras maiúsculas, ou em que o arquivo PHP eventualmente foi salvo em CP1252/Latin-1 por algum editor.\r\n- **`SSHManager::instanceExists()` endurecido.** O critério de \"instância existente\" passou de `dir AND (.credentials OR .env)` para `dir AND .credentials AND container \u003ccliente\u003e-app existente`. Antes, uma tentativa parcial de provisionamento que deixasse apenas o `.env` no diretório fazia o `CreateAccount` entrar em fast-path e ler credenciais inexistentes. Também é retornado o flag `partial` para sinalizar diretório sem `.credentials` (útil em diagnóstico).\r\n- Mensagem do logActivity (`AfterShoppingCartCheckout`) ficou mais descritiva, sugerindo padronizar o nome do Custom Field em **Setup \u003e Products/Services \u003e Custom Fields**.\r\n\r\n## v3.1.6 (2026-05-04)\r\n\r\n### Corrigido\r\n- **HaRP (AppAPI) Shared Key exibida como \"Não disponível\" no painel do cliente e no painel admin de credenciais.** O `manage.sh` v11.x deixou de gravar o campo `Shared Key` na seção `HaRP` do ficheiro `.credentials` (na verdade, a seção **HaRP** sequer existe no novo formato) — o valor é escrito apenas como `HP_SHARED_KEY=...` no `docker-compose.yml` da instância e exposto como variável de ambiente do container `\u003ccliente\u003e-harp`. O parser do módulo continuava procurando pela linha antiga e devolvia string vazia.\r\n\r\n### Adicionado\r\n- **`SSHManager::getHarpSharedKey($clientName)`** — novo método que tenta, em ordem: (a) `grep` em `/opt/nextcloud-customers/\u003ccliente\u003e/docker-compose.yml` pela linha `HP_SHARED_KEY=...`; (b) `docker exec \u003ccliente\u003e-harp printenv HP_SHARED_KEY`. Devolve `array {success, key, source, raw}`, registrando em qual fonte a chave foi encontrada.\r\n- **Fallback automático nos painis do cliente e do admin.** Tanto `nextcloudsaas_ClientArea()` quanto `nextcloudsaas_viewCredentials()` agora chamam `getHarpSharedKey()` quando o parser do `.credentials` não achou `harp_shared_key`. A descoberta é logada como `clientarea_harp_fallback` e `viewCredentials_harp_fallback` no Module Log para facilitar diagnóstico.\r\n\r\n## v3.1.5 (2026-05-04)\r\n\r\n### Adicionado\r\n- **`SSHManager::instanceExists($clientName)`** — nova verificação remota que consulta em uma única chamada SSH se o diretório `/opt/nextcloud-customers/\u003ccliente\u003e/` existe e se há `.credentials` ou `.env`. Usado pelo `CreateAccount` para detectar instâncias já provisionadas.\r\n- **Botão admin `Provisionar Agora`** (`nextcloudsaas_provisionNow`) na **Module Commands** do serviço. Re-executa `CreateAccount` de forma idempotente sem esperar pelo cron de 5 minutos: útil para destravar Orders pendentes após correcção de DNS ou quando a instância já existe no servidor mas o Order continua **Pending**. Mostra um painel com o resultado (`success` ou erro), o status do Order e o horário início/fim.\r\n- **`nextcloudsaas_acceptOrderForService($serviceId)`** — função utilitária que localiza o `orderid` ligado a um serviço e, se estiver em **Pending**, chama `localAPI('AcceptOrder', [...])` com `autosetup=false` e `sendemail=false`. Idempotente para Orders já ativos; preserva Cancelled/Fraud sem tocar.\r\n\r\n### Corrigido\r\n- **Order ficava em `Pending` após provisionamento automático via cron.** O hook `AfterCronJob` previamente atualizava apenas `tblhosting.domainstatus = Active`, mas não aceitava o Order (`tblorders.status` continuava `Pending`). Agora, após `ModuleCreate` retornar `success`, o cron chama `nextcloudsaas_acceptOrderForService` e loga a transição em **Activity Log** (`Order do Serviço #X aceito automaticamente (Pending -\u003e Active)`).\r\n- **`CreateAccount` falhava quando a instância já existia no servidor.** Agora, antes de chamar `manage.sh create`, o módulo verifica via SSH se a instância já está provisionada; se sim, **reutiliza as credenciais existentes** em `.credentials` / `.env`, atualiza o serviço WHMCS via `UpdateClientProduct` e popula os Custom Fields, retornando `success`. Isto destrava Orders cuja instância foi criada por um caminho diferente (cron, manage.sh manual, recuperação de erro).\r\n- **`CreateAccount` agora ativa o Order também no fluxo síncrono.** Mesmo quando o `CreateAccount` é executado diretamente (Module Create no admin), o módulo chama `nextcloudsaas_acceptOrderForService` no final — garantindo que produtos FREE (fatura `$0`) ou pedidos com `autosetup` desligado não fiquem com Order em **Pending** indefinidamente.\r\n- **Falha de quota no fast-path não aborta a ativação.** Quando reutilizando uma instância existente, eventuais erros em `setUserQuota`/`setDefaultQuota` são logados como warning mas não invalidam o `success` (em provisionamento novo o comportamento original é mantido: erro de quota propaga).\r\n\r\n### Documentado\r\n- README **§6 Operate**: nova subseção **“Destravar um Order que ficou em Pending”** explicando os três caminhos (botão `Provisionar Agora`, `Module Create` + Activity Log, `Accept Order` manual em **Orders \u003e List Pending**) e quando usar cada um.\r\n- CHANGELOG: documentação desta release.\r\n\r\n## v3.1.4 (2026-05-04)\r\n\r\n### Removido\r\n- **Admin Service Tab (`nextcloudsaas_AdminServicesTabFields`):** removidos os campos **URL do Collabora**, **URL do Signaling** e as duas linhas extras (`collabora-01.defensys.seg.br`, `signaling-01.defensys.seg.br`) do campo **DNS Necessários**. Apenas o domínio principal do cliente passa a aparecer no campo, agora rotulado como **DNS Necessário (Registro A)**, em consonância com o painel do assinante (já limpo na v3.1.3) e com a arquitetura compartilhada do manager v11.x.\r\n\r\n### Corrigido\r\n- **Estado da Instância:** a contagem agora considera **3 containers dedicados** (`\u003ccliente\u003e-app`, `\u003ccliente\u003e-cron`, `\u003ccliente\u003e-harp`) em vez de 10. A rótulo passa a indicar *\"Ativo (3/3 containers dedicados)\"*. Para verificar o estado dos serviços globais (`shared-*`) continue usando o botão **Serviços Compartilhados** (já disponível desde a v3.0.0).\r\n\r\n## v3.1.3 (2026-05-04)\r\n\r\n### Removido\r\n- **Painel da área do cliente (`clientarea.tpl`):** removidas as seções **Collabora Online**, **Banco de Dados (MariaDB)**, **TURN Server** e **Signaling Server** do bloco de credenciais. Esses serviços passaram a ser globais (`shared-*`) na arquitetura v11.x do manager e não pertencem mais ao assinante; expor URLs/secrets confundia o cliente. A seção **HaRP (AppAPI)** continua exposta porque é dedicada por cliente (`\u003ccliente\u003e-harp`).\r\n- **Painel da área do cliente:** removido o lembrete *\"Os serviços auxiliares Collabora Online (...) e Talk HPB (...) são publicados em domínios globais da Defensys e não exigem nenhuma configuração DNS de sua parte\"* logo abaixo da tabela de DNS — era útil na transição v2.x → v3.0.0, agora só polui a tela.\r\n- **E-mail de provisionamento (`nextcloudsaas_hooks.php`):** removidas as linhas Collabora Online / Talk (HPB) do bloco *\"Serviços Incluídos\"* e o mesmo lembrete sobre domínios globais no bloco *\"Registro DNS configurado\"*.\r\n\r\n## v3.1.2 (2026-05-04)\r\n\r\n### Corrigido\r\n- `nextcloudsaas_CreateAccount`: domínio agora é obtido via novo `Helper::getDomain($params)`, que prioriza `$params['domain']` mas faz fallback para `$params['customfields']` (chaves com/sem acento, em PT/EN) e, em último recurso, consulta diretamente `tblcustomfieldsvalues` pelo `serviceid`/`pid`. Resolve a falha **\"Domínio inválido ou não fornecido\"** em pedidos criados pelo admin via **Orders \u003e Add New Order** (fluxo no qual o hook `AfterShoppingCartCheckout` não dispara).\r\n- Mensagens de erro do `CreateAccount` agora distinguem **(a)** Custom Field ausente no produto, **(b)** Custom Field existente porém vazio no serviço, e **(c)** domínio com formato inválido — com instruções claras de onde corrigir.\r\n- `tblhosting.domain` é sincronizado de forma idempotente quando o módulo recupera o domínio via fallback (corrige a tabela para que `ChangePassword`, `ChangePackage` e SSO funcionem nos pedidos do admin).\r\n\r\n### Adicionado\r\n- Hook `AcceptOrder` em `includes/hooks/nextcloudsaas_hooks.php`: espelha `AfterShoppingCartCheckout` para pedidos criados pelo admin. Ao aceitar um pedido, o valor do Custom Field **\"Domínio da Instância\"** é copiado para `tblhosting.domain` e `username` é definido como `admin`.\r\n- `Helper::getDomain(array $params): string` — nova API pública e testada para resolver domínio em qualquer fluxo.\r\n\r\n### Documentado\r\n- README §2.4.1 **Custom Fields obrigatórios**: detalha o **Campo 0 “Domínio da Instância”** (Field Type, Validation regex, Required, Show on Order Form) e inclui nota explícita sobre como preencher o campo em pedidos criados pelo admin **antes** de clicar **Accept Order**.\r\n\r\n## v3.1.1 (2026-05-04)\r\n\r\n### Corrigido\r\n- `SSHManager`: a porta `22` agora é fallback robusto sempre que o WHMCS envia `0`, string vazia ou um valor fora do intervalo `1–65535`. Antes, o admin precisava marcar **\"Override with Custom Port\"** com `22` manualmente.\r\n- `SSHManager::testConnection()`: mensagem de erro passou a incluir **dicas específicas** baseadas no sintoma. Quando ocorre o clássico `Connection closed by server` (causado pelo padrão `PasswordAuthentication no` em `/etc/ssh/sshd_config.d/60-cloudimg-settings.conf` das imagens cloud do Ubuntu 24.04+), o módulo agora indica exatamente o ficheiro a editar e o `systemctl reload ssh` necessário. Também há dicas para `authentication failed` (credenciais) e `timeout` (firewall).\r\n\r\n### Documentado\r\n- README §2.1 (Pré-requisitos do Servidor): exigência explícita de `PasswordAuthentication yes` (ou autenticação por chave SSH) e da configuração **Override with Custom Port = 22** no WHMCS.\r\n\r\n## v3.1.0 (2026-05-01)\r\n\r\n### Adicionado\r\n- Botão admin **\"Listar Instâncias do Servidor\"** (`listAllInstances`): dashboard HTML consolidado com todas as instâncias provisionadas no servidor, estado dos 3 containers dedicados (`app`, `cron`, `harp`) e uso de disco por instância (`du -sh`).\r\n- Botão admin **\"Ver Logs Talk Recording\"** (`viewRecordingLogs`): mostra `docker logs --tail 100 shared-recording` no painel admin.\r\n- **CI GitHub Actions** (`.github/workflows/ci.yml`): `php -l` em todos os ficheiros PHP em PRs/pushes para `main`/`develop` + execução de PHPUnit.\r\n- **Release GitHub Actions** (`.github/workflows/release.yml`): a cada `git push origin vX.Y.Z` valida que `whmcs.json::version` bate com a tag, empacota o ZIP, cria o GitHub Release e anexa o artefato. Suporta corpo do release lido de `CHANGELOG.md`.\r\n- **Suite PHPUnit inicial** em `tests/` (PHPUnit 10.5) validando o contrato público do `Helper`: 1 DNS por cliente, 3 sufixos de container dedicado, 8 serviços globais `shared-*`, hostnames globais independentes do domínio do cliente. 6 testes / 17 assertions.\r\n\r\n### Alterado\r\n- `AdminCustomButtonArray()` passa a expor 12 botões (eram 10).\r\n- README e USAGE atualizados com a nova seção Changelog e a nova tabela de botões admin.\r\n\r\n## v3.0.0 (2026-05-01) — BREAKING\r\n\r\n### Alterado (BREAKING)\r\n- Alinha o módulo à arquitetura compartilhada do Nextcloud SaaS Manager v11.x (`manage.sh` v11.3+).\r\n- Cada cliente passa a ter **3 containers dedicados** (`\u003ccliente\u003e-app`, `\u003ccliente\u003e-cron`, `\u003ccliente\u003e-harp`) em vez de 10.\r\n- **8 serviços globais `shared-*`** (db, redis, collabora, turn, nats, janus, signaling, recording) compartilhados entre todas as instâncias.\r\n- Cada cliente passa a exigir **apenas 1 registro DNS A** (era 3): Collabora, Talk HPB e TURN agora ficam em hostnames globais.\r\n\r\n### Adicionado\r\n- `Helper::SHARED_HOSTNAMES_DEFAULT` e `Helper::getSharedHostnames()` (com override via `configoption7..9`).\r\n- `Helper::SHARED_CONTAINERS` (lista dos 8 serviços globais).\r\n- `SSHManager::verifySharedServices()` para checar os 8 `shared-*`.\r\n- Botão admin **\"Serviços Compartilhados\"** (`checkSharedServices`).\r\n\r\n### Removido (deprecado mas mantido como stub)\r\n- `Helper::getCollaboraDomain()` e `Helper::getSignalingDomain()` agora devolvem o hostname global, ignorando o domínio do cliente.\r\n\r\n## v2.6.1 (2026-04-07)\r\n- Correção crítica: Fatal Error por redeclaração de funções (`hooks.php` do módulo agora é apenas referência).\r\n- Hook alterado de `DailyCronJob` para `AfterCronJob` (executa a cada cron do WHMCS).\r\n- Status do serviço muda automaticamente de `Pending` para `Active` após provisionamento bem-sucedido via cron.\r\n- HTML escapado no botão \"Verificar DNS\".\r\n\r\n## v2.6.0 (2026-04-04)\r\n- Cron de provisionamento automático: verifica DNS a cada execução do cron WHMCS, cria a instância quando o registro principal estiver correto e envia e-mail com credenciais.\r\n\r\n(Para o histórico completo das versões 2.0.0 → 2.5.4 ver o README.md)\r\n","../README.md":"# Módulo Nextcloud-SaaS para WHMCS v3.1.4\r\n\r\n**Autor:** Defensys / Manus AI  \r\n**Versão:** 3.1.4  \r\n**Licença:** Proprietária  \r\n**Compatível com:** Nextcloud SaaS Manager **v11.x** (`manage.sh` v11.3+)\r\n\r\n---\r\n\r\n## 1. Visão Geral\r\n\r\nO Módulo Nextcloud-SaaS para WHMCS é uma solução completa para provisionar e gerir instâncias Nextcloud como um produto de Software as a Service (SaaS). A partir da **v3.0.0**, o módulo foi alinhado à nova **arquitetura compartilhada** introduzida pelo Nextcloud SaaS Manager v11.x (`manage.sh` v11.3+): em vez dos antigos 10 containers por cliente, cada instância passa a ter apenas **3 containers dedicados** (Nextcloud, Cron e HaRP) que se conectam a **8 serviços globais `shared-*`** rodando uma única vez no host. Tudo é publicado atrás do proxy reverso Traefik com provisionamento automático de SSL via Let's Encrypt.\r\n\r\nEsta integração continua centralizando toda a lógica de gestão de instâncias no `manage.sh`, resultando em maior estabilidade, segurança, densidade e facilidade de manutenção.\r\n\r\n### 1.1. Arquitetura da Instância (v3.0.0)\r\n\r\n**Containers dedicados por cliente (3):**\r\n\r\n| Container             | Descrição                                               |\r\n|-----------------------|---------------------------------------------------------|\r\n| `\u003ccliente\u003e-app`       | O próprio Nextcloud Hub                                 |\r\n| `\u003ccliente\u003e-cron`      | Execução de tarefas agendadas em background             |\r\n| `\u003ccliente\u003e-harp`      | HaRP (AppAPI) para integração de aplicações             |\r\n\r\n**Serviços globais compartilhados (8):**\r\n\r\n| Container             | Descrição                                                       |\r\n|-----------------------|------------------------------------------------------------------|\r\n| `shared-db`           | MariaDB compartilhado por todas as instâncias                    |\r\n| `shared-redis`        | Cache Redis compartilhado                                        |\r\n| `shared-collabora`    | Suite de escritório Collabora Online                             |\r\n| `shared-turn`         | TURN/STUN global para o Nextcloud Talk                           |\r\n| `shared-nats`         | Sistema de mensagens NATS para o HPB                             |\r\n| `shared-janus`        | Gateway WebRTC Janus para o HPB                                  |\r\n| `shared-signaling`    | Servidor de sinalização Spreed (HPB)                             |\r\n| `shared-recording`    | Servidor de gravação de chamadas Talk (novidade v11.x)           |\r\n\r\n### 1.2. Requisitos de DNS (v3.0.0)\r\n\r\nPara que uma instância funcione corretamente é necessário apenas **um (1) registro DNS do tipo A** apontando para o endereço IP do servidor de hospedagem:\r\n\r\n1.  `dominio.com.br` (para o Nextcloud)\r\n\r\nOs serviços auxiliares (Collabora, Talk HPB, TURN) deixaram de exigir DNS por cliente: passam a ser publicados em **hostnames globais geridos pela Defensys** (configurados no servidor via `--collabora-domain`, `--signaling-domain` e `--turn-domain` do `manage.sh`).\r\n\r\nO Traefik continua a detetar automaticamente o domínio do cliente e a provisionar o certificado SSL correspondente.\r\n\r\n\u003e **Novidade v3.0.0:** Provisionamento automático continua a funcionar: após o checkout, o sistema verifica automaticamente o registro DNS a cada 5 minutos. Quando estiver correto, a instância é criada automaticamente e o cliente recebe um email com as credenciais. Se após 3 dias o DNS não estiver configurado, o admin é notificado.\r\n\r\n---\r\n\r\n## 2. Instalação e Configuração\r\n\r\n### 2.1. Pré-requisitos do Servidor\r\n\r\n-   Um servidor Ubuntu Linux com o Nextcloud SaaS Manager **v11.x** (`manage.sh` v11.3+) já instalado em `/opt/nextcloud-customers` e com `setup-shared.sh` já executado (8 serviços `shared-*` UP).\r\n-   Docker e Docker Compose instalados e a funcionar.\r\n-   Traefik a correr como proxy reverso.\r\n-   Acesso SSH ao servidor a partir do servidor WHMCS.\r\n-   **Utilizador SSH com sudo NOPASSWD:** O utilizador SSH (ex: `defensys`) precisa de permissões de `sudo` sem password. Para configurar, adicione a seguinte linha ao ficheiro `/etc/sudoers` no servidor de hospedagem:\r\n    ```\r\n    defensys ALL=(ALL) NOPASSWD: ALL\r\n    ```\r\n-   **Autenticação SSH habilitada para o utilizador.** Imagens cloud do Ubuntu (24.04+) vêm, por padrão, com o ficheiro `/etc/ssh/sshd_config.d/60-cloudimg-settings.conf` definindo `PasswordAuthentication no`. Se o WHMCS for autenticar por senha, edite esse ficheiro e altere para `PasswordAuthentication yes`, ou configure autenticação por chave SSH (vide `configoption5`). Sem isso, o `Test Connection` falhará com **\"Connection closed by server\"** e o módulo a partir da v3.1.1 mostrará essa dica diretamente. Após alterar, executar:\r\n    ```bash\r\n    sudo systemctl reload ssh\r\n    ```\r\n-   **Porta SSH conhecida pelo WHMCS.** No WHMCS → `Server Details`, marque **Override with Custom Port** e preencha **22** (ou a porta usada pelo seu sshd). A v3.1.1 do módulo já assume `22` como fallback se o WHMCS enviar `0`/vazio.\r\n\r\n### 2.2. Instalação do Módulo\r\n\r\n1.  **Copiar os ficheiros:** Transfira o diretório `nextcloudsaas` para a pasta de módulos do seu WHMCS:\r\n    ```bash\r\n    /caminho/para/whmcs/modules/servers/\r\n    ```\r\n\r\n2.  **Verificar a estrutura:** A estrutura final deve ser:\r\n    ```\r\n    /modules/servers/nextcloudsaas/\r\n    ├── hooks.php\r\n    ├── nextcloudsaas.php\r\n    ├── whmcs.json\r\n    ├── lib/\r\n    │   ├── Helper.php\r\n    │   ├── NextcloudAPI.php\r\n    │   └── SSHManager.php\r\n    ├── templates/\r\n    │   ├── clientarea.tpl\r\n    │   └── error.tpl\r\n    └── vendor/  (contém phpseclib3)\r\n    ```\r\n\r\n### 2.3. Configuração do Servidor no WHMCS\r\n\r\n1.  Vá para **Setup \u003e Products/Services \u003e Servers**.\r\n2.  Crie um novo servidor ou edite um existente.\r\n3.  No campo **Hostname or IP Address**, insira o IP do seu servidor Nextcloud SaaS (ex: `200.50.151.21`).\r\n4.  Em **Server Details**, selecione `Nextcloud SaaS` como o **Module**.\r\n5.  Insira o **Username** (`defensys` ou outro utilizador com acesso sudo) e a **Password** para o acesso SSH.\r\n6.  **Importante:** Desmarque a opção **Secure** (`Check to use SSL Mode for Connections`), pois a comunicação é via SSH, não HTTPS.\r\n7.  **Importante:** Marque a opção **Override with Custom Port** e defina a porta como **22**.\r\n8.  Clique em **Test Connection**. Deverá ver uma mensagem de sucesso.\r\n\r\n### 2.4. Configuração do Produto no WHMCS\r\n\r\n1.  Vá para **Setup \u003e Products/Services \u003e Products/Services**.\r\n2.  Crie um novo produto.\r\n3.  Na aba **Module Settings**, selecione `Nextcloud SaaS` para o **Module Name** e o servidor que acabou de configurar.\r\n4.  Configure as **Opções do Módulo**:\r\n\r\n    | Opção                         | Descrição                                                                                             |\r\n    |-------------------------------|-------------------------------------------------------------------------------------------------------|\r\n    | **Quota de Armazenamento (GB)** | Define a quota de disco para o utilizador `admin` e a quota padrão para todos os novos utilizadores. Ex: `50`. |\r\n    | **Máximo de Utilizadores**      | Define o número máximo de utilizadores que podem ser criados na instância.                            |\r\n    | **Collabora Online**            | Sempre ativo na arquitetura atual. Pode deixar em `on`.                                               |\r\n    | **Nextcloud Talk (HPB)**        | Ativa o High Performance Backend. Deixe em `on`.                                                      |\r\n    | **Caminho da Chave SSH**        | **Opcional.** Se preferir usar autenticação por chave, insira o caminho absoluto para a chave privada no servidor WHMCS. Deixe em branco para usar a password do servidor. |\r\n    | **Prefixo do Nome do Cliente**  | **Opcional.** Adiciona um prefixo ao nome do cliente usado pelo `manage.sh` (ex: `nc-`). Útil para organização. |\r\n\r\n5.  Na aba **Custom Fields**, crie os 5 campos abaixo. Os nomes devem ser **exatos** (com acentos).\r\n\r\n#### 2.4.1. Custom Fields obrigatórios\r\n\r\nO módulo lê o domínio da instância a partir do Custom Field **\"Domínio da Instância\"**. Sem ele, `nextcloudsaas_CreateAccount` aborta com a mensagem `\"Domínio não fornecido\"`. O hook `AfterShoppingCartCheckout` (carrinho do cliente) e o hook `AcceptOrder` (pedido criado pelo admin em **Orders \u003e Add New Order**) copiam automaticamente o valor desse campo para `tblhosting.domain` antes do provisionamento. **É obrigatório criar este Custom Field para que o módulo funcione.**\r\n\r\n**Campo 0: Domínio da Instância (obrigatório)**\r\n- **Field Name:** `Domínio da Instância`\r\n- **Field Type:** Text Box\r\n- **Description:** `Domínio onde o Nextcloud será publicado (ex.: nextcloud.suaempresa.com.br). Você precisa criar um registro DNS A apontando este domínio para o IP do nosso servidor.`\r\n- **Validation:** `/^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$/i`\r\n- **Select Options:** (deixar vazio)\r\n- **Display Order:** `0`\r\n- **Admin Only:** Desmarcado\r\n- **Required Field:** **Marcado**\r\n- **Show on Order Form:** **Marcado**\r\n- **Show on Invoice:** Desmarcado\r\n\r\n\u003e **Nota para pedidos criados pelo admin:** o WHMCS não exibe o Custom Field na tela `Orders \u003e Add New Order`. Após criar o pedido, **antes** de clicar em **Accept Order**, abra o serviço em **Clients \u003e View/Search Clients \u003e [cliente] \u003e Products/Services \u003e Custom Fields** e preencha o **Domínio da Instância**. O hook `AcceptOrder` (v3.1.2+) copiará o valor para `tblhosting.domain` no momento em que você aceitar o pedido.\r\n\r\n**Campo 1: Client Name**\r\n- **Field Name:** `Client Name`\r\n- **Field Type:** Text Box\r\n- **Description:** `Identificador da instância no servidor (preenchido automaticamente)`\r\n- **Validation:** (deixar vazio)\r\n- **Select Options:** (deixar vazio)\r\n- **Display Order:** `1`\r\n- **Admin Only:** Marcado\r\n- **Required Field:** Desmarcado\r\n- **Show on Order Form:** Desmarcado\r\n- **Show on Invoice:** Desmarcado\r\n\r\n**Campo 2: Nextcloud URL**\r\n- **Field Name:** `Nextcloud URL`\r\n- **Field Type:** Text Box\r\n- **Description:** `URL de acesso ao Nextcloud`\r\n- **Validation:** (deixar vazio)\r\n- **Select Options:** (deixar vazio)\r\n- **Display Order:** `2`\r\n- **Admin Only:** Desmarcado\r\n- **Required Field:** Desmarcado\r\n- **Show on Order Form:** Desmarcado\r\n- **Show on Invoice:** Desmarcado\r\n\r\n**Campo 3: Collabora URL**\r\n- **Field Name:** `Collabora URL`\r\n- **Field Type:** Text Box\r\n- **Description:** `URL do Collabora Online (editor de documentos)`\r\n- **Validation:** (deixar vazio)\r\n- **Select Options:** (deixar vazio)\r\n- **Display Order:** `3`\r\n- **Admin Only:** Desmarcado\r\n- **Required Field:** Desmarcado\r\n- **Show on Order Form:** Desmarcado\r\n- **Show on Invoice:** Desmarcado\r\n\r\n**Campo 4: Signaling URL**\r\n- **Field Name:** `Signaling URL`\r\n- **Field Type:** Text Box\r\n- **Description:** `URL do servidor HPB para Nextcloud Talk`\r\n- **Validation:** (deixar vazio)\r\n- **Select Options:** (deixar vazio)\r\n- **Display Order:** `4`\r\n- **Admin Only:** Desmarcado\r\n- **Required Field:** Desmarcado\r\n- **Show on Order Form:** Desmarcado\r\n- **Show on Invoice:** Desmarcado\r\n\r\n---\r\n\r\n## 3. Funcionalidades do Módulo\r\n\r\n### 3.1. Ciclo de Vida do Serviço\r\n\r\n-   **CreateAccount:** Verifica primeiro se os 3 registros DNS estão corretos (apontando para o IP do servidor configurado no WHMCS). Se OK, executa `manage.sh \u003ccliente\u003e \u003cdominio\u003e create`. Cria a instância completa, lê o ficheiro `.credentials` gerado, guarda a password do admin no WHMCS, e define a quota padrão para todos os utilizadores. Se DNS não está OK, retorna mensagem informativa e o cron automático continuará verificando.\r\n-   **SuspendAccount:** Executa `manage.sh \u003ccliente\u003e _ stop`. Para os 3 containers dedicados da instância (`app`, `cron`, `harp`).\r\n-   **UnsuspendAccount:** Executa `manage.sh \u003ccliente\u003e _ start`. Inicia os 3 containers dedicados.\r\n-   **TerminateAccount:** Executa `manage.sh \u003ccliente\u003e _ backup` e depois `manage.sh \u003ccliente\u003e _ remove`. Faz um backup completo antes de apagar permanentemente a instância (containers, volumes e dados).\r\n-   **Renew:** Verifica se a instância está ativa e reinicia se necessário.\r\n-   **ChangePackage:** Altera a quota do utilizador `admin` e a quota padrão para novos utilizadores via `occ`.\r\n-   **ChangePassword:** Altera a password do utilizador `admin` via API OCS (método principal) ou `docker exec occ` (fallback SSH).\r\n\r\n### 3.2. Botões Personalizados (Admin)\r\n\r\nNa área de administração do WHMCS, na página do serviço do cliente, estão disponíveis os seguintes botões:\r\n\r\n-   **Provisionar Agora (v3.1.5):** Re-executa `CreateAccount` de forma idempotente sem esperar o cron de 5 minutos. Útil para destravar Orders que ficaram em **Pending** após o cliente corrigir o DNS, ou quando a instância já existe no servidor (criada por execução anterior do cron ou via `manage.sh` manual). Ativa o serviço e o Order automaticamente. Veja **§6. Operar \u003e Destravar um Order que ficou em Pending**.\r\n-   **Verificar Estado:** Mostra o estado dos 3 containers dedicados (`\u003ccliente\u003e-app`, `\u003ccliente\u003e-cron`, `\u003ccliente\u003e-harp`).\r\n-   **Verificar DNS:** Verifica se o registro DNS A do domínio do cliente aponta para o IP do servidor configurado no WHMCS. Exibe tabela detalhada com status do registro.\r\n-   **Reiniciar Instância:** Executa `stop` e `start` (o manage.sh não tem comando restart).\r\n-   **Fazer Backup:** Executa o comando de backup do `manage.sh`.\r\n-   **Atualizar Instância:** Executa o comando de atualização do `manage.sh` (pull + upgrade).\r\n-   **Testar Conexão SSH:** Valida a comunicação com o servidor.\r\n-   **Testar API Nextcloud:** Valida a comunicação com a API OCS da instância.\r\n-   **Ver Credenciais:** Mostra o conteúdo do ficheiro `.credentials` em painel HTML formatado.\r\n-   **Ver Logs:** Mostra as últimas 50 linhas de logs do container `app`.\r\n\r\n### 3.3. Botões Personalizados (Cliente)\r\n\r\n-   **Verificar Estado:** Mostra o estado dos containers da instância.\r\n-   **Reiniciar Instância:** Reinicia todos os containers.\r\n\r\n### 3.4. Área de Cliente\r\n\r\nO cliente tem acesso a um painel de controlo completo e moderno, que inclui:\r\n\r\n-   **Estado da Instância:** Mostra se a instância está ativa, parada ou parcial, e o número de containers a correr.\r\n-   **Links de Acesso Rápido:** Botões para aceder diretamente ao Nextcloud, Collabora e Talk.\r\n-   **Informações de Armazenamento:** Barra de progresso e detalhes sobre o uso de disco (obtido via `du -sh` no servidor).\r\n-   **Credenciais:** Informações de acesso completas, lidas diretamente do ficheiro `.credentials` da instância.\r\n-   **Componentes da Instância:** Lista dos 3 containers dedicados (`app`, `cron`, `harp`) e dos 8 serviços globais `shared-*` aos quais a instância se conecta.\r\n-   **Aviso de DNS:** Lembrete constante do registro DNS necessário (1 único, na arquitetura compartilhada v3.0.0).\r\n\r\n---\r\n\r\n## 4. Changelog\r\n\r\n-   **v3.1.7 (2026-05-04):** UX + robustez de provisionamento.\r\n    -   **Removida** a seção **HaRP (AppAPI) \u003e Shared Key** do painel do cliente (é credencial interna do AppAPI; não pertence ao assinante). O painel admin **Ver Credenciais** continua exibindo a chave (com o fallback da v3.1.6).\r\n    -   Lookup do Custom Field **Domínio da Instância** ficou tolerante a acentos/case/encoding por meio do helper `nextcloudsaas_findDomainCustomField()` (3 estratégias em cascata, incluindo `LOWER(fieldname) LIKE`).\r\n    -   `SSHManager::instanceExists()` endurecido: agora exige `.credentials` **e** container `\u003ccliente\u003e-app` existente; retorna também a flag `partial` para diagnóstico de provisionamentos parciais.\r\n\r\n-   **v3.1.6 (2026-05-04):** Hotfix HaRP Shared Key.\r\n    -   Corrige a Shared Key exibida como **\"Não disponível\"** na seção HaRP (AppAPI) do painel do cliente e no painel admin de credenciais. O `manage.sh` v11.x deixou de gravar a chave no `.credentials`; agora ela é lida diretamente do `docker-compose.yml` (linha `HP_SHARED_KEY=...`) ou via `docker exec \u003ccliente\u003e-harp printenv HP_SHARED_KEY` quando o parser não encontrar.\r\n    -   Novo método `SSHManager::getHarpSharedKey($clientName)` com dois caminhos de fallback e logging em Module Log (`clientarea_harp_fallback`, `viewCredentials_harp_fallback`).\r\n\r\n-   **v3.1.5 (2026-05-04):** Idempotência, ativação automática de Order e botão **Provisionar Agora**.\r\n    -   Novo botão admin **Provisionar Agora** (`provisionNow`) na **Module Commands** do serviço: re-executa `CreateAccount` idempotentemente, ativa o serviço e aceita o Order — útil quando o Order ficou em **Pending** após o cron já ter criado a instância, ou logo após o cliente corrigir o DNS.\r\n    -   `nextcloudsaas_CreateAccount` agora é **idempotente**: se a instância já existe em `/opt/nextcloud-customers/\u003ccliente\u003e/`, o módulo lê as credenciais existentes (`.credentials` / `.env`), atualiza ontainers dedicados + 8 serviços globais (incluindo Talk Recording), confirmação de restart atualizada.\r\n    -   `whmcs.json`, README e USAGE atualizados para v3.0.0.\r\n-   **v2.6.1 (2026-04-07):**\r\n    -   **Correção crítica: Fatal Error por redeclaração de funções.** O WHMCS carregava ambos `includes/hooks/nextcloudsaas_hooks.php` e `modules/servers/nextcloudsaas/hooks.php`, causando `Cannot redeclare nextcloudsaas_cronProcessPendingService()`. O `hooks.php` do módulo agora é apenas um ficheiro de referência que evita duplicação.\r\n    -   **Correção: Hook alterado de `DailyCronJob` para `AfterCronJob`.** O `DailyCronJob` executava apenas 1x por dia. O `AfterCronJob` executa a cada execução do cron WHMCS (recomendado: 5 minutos), garantindo verificação DNS frequente.\r\n    -   **Correção: Status do serviço muda automaticamente de Pending para Active** após provisionamento bem-sucedido via cron. O `localAPI('ModuleCreate')` não altera o status automaticamente; agora o hook faz isso explicitamente via `Capsule::table('tblhosting')-\u003eupdate()`.\r\n    -   **Correção: HTML escapado no botão \"Verificar DNS\".** O painel usava o tipo `status` que passava o conteúdo por `htmlspecialchars()`. Adicionado tipo `dns` com renderização HTML direta.\r\n    -   **Correção: Estrutura do ZIP de release.** O ZIP agora não contém prefixo de pasta — basta descompactar na raiz do WHMCS para instalar.\r\n-   **v2.6.0 (2026-04-07):**\r\n    -   **Novo: Provisionamento automático via verificação DNS por cron.** O sistema verifica automaticamente os registros DNS de serviços pendentes a cada execução do cron WHMCS (recomendado: 5 minutos). Quando os 3 registros DNS estão corretos, a instância é criada automaticamente via `localAPI('ModuleCreate')`.\r\n    -   **Novo: Email automático ao cliente** com credenciais de acesso (URL, usuário, senha) quando a instância é provisionada automaticamente. Email em HTML profissional com todas as informações de serviço.\r\n    -   **Novo: Timeout de 3 dias** para verificação DNS. Se o cliente não configurar os registros em 3 dias, o sistema para de verificar e envia notificação ao administrador com detalhes do serviço e registros DNS necessários.\r\n    -   **Novo: Botão \"Verificar DNS\" no admin** que mostra tabela detalhada com status de cada registro DNS (hostname, IP esperado, IP resolvido, status OK/FALHA).\r\n    -   **Novo: Funções DNS no Helper.php** — `checkDnsRecords()`, `getRequiredDomains()`, `getServerConfig()` para verificação programática de registros DNS.\r\n    -   **Melhoria: IP do servidor dinâmico** — O IP é sempre obtido do Server configurado no WHMCS (`tblservers`), nunca hardcoded. Funciona corretamente em ambientes multi-servidor.\r\n    -   **Melhoria: Validação DNS no CreateAccount** — Antes de provisionar, verifica se o DNS está correto. Se não estiver, retorna mensagem informativa e o cron continuará verificando.\r\n    -   **Melhoria: ClientArea atualizado** com tabela DNS formatada e mensagem de \"Aguardando configuração DNS\" para serviços pendentes.\r\n    -   **Melhoria: Hook AfterShoppingCartCheckout** agora grava timestamp de início da verificação DNS nas notas do serviço para controle de timeout.\r\n    -   **Melhoria: Instruções DNS no carrinho** atualizadas com mensagem sobre provisionamento automático.\r\n-   **v2.5.4 (2026-03-27):**\r\n    -   **Correção definitiva do formulário de domínio:** Removida a dependência do formulário SLD/TLD do WHMCS (que rejeitava subdomínios como `next-jaguar.defensys.seg.br`). Agora utiliza um Custom Field \"Domínio da Instância\" para capturar o hostname completo sem restrições.\r\n    -   **Novo hook `AfterShoppingCartCheckout`:** Copia automaticamente o valor do Custom Field para o campo Domain do serviço, garantindo que `$params['domain']` funciona corretamente em todas as funções do módulo.\r\n    -   **Novo hook `ServiceEdit`:** Sincroniza o campo Domain com o Custom Field quando o serviço é editado no admin.\r\n    -   **JavaScript simplificado:** Mostra instruções DNS junto ao campo de domínio e adiciona validação básica de formato.\r\n    -   **Configuração necessária:** Desativar \"Require Domain\" no produto e criar Custom Field \"Domínio da Instância\" (Text Box, obrigatório, Show on Order Form).\r\n-   **v2.5.3 (2026-03-27):**\r\n    -   Corrigida validação de domínio no formulário de order: adicionado `seg.br` e todos os TLDs brasileiros à lista de TLDs compostos\r\n    -   Lista de TLDs compostos expandida para incluir TLDs internacionais comuns (PT, AR, MX, CO, etc.)\r\n    -   Domínios como `next-jaguar.defensys.seg.br` agora são corretamente separados em SLD=`next-jaguar.defensys` e TLD=`seg.br`\r\n-   **v2.5.2 (2026-02-14):**\r\n    -   **Novo:** Atualização automática do ficheiro `.credentials` quando a password é alterada via ChangePassword. A password do Nextcloud no `.credentials` fica sempre sincronizada.\r\n    -   Nova função `updateCredentialsPassword()` no SSHManager com escape correto de caracteres especiais (colchetes, barras, etc.).\r\n-   **v2.5.1 (2026-02-14):**\r\n    -   **Correção crítica:** Username do Nextcloud agora é sempre `admin` (hardcoded). O `$params['username']` do WHMCS pode estar truncado ou diferente (ex: `nextclou`), causando erro \"User does not exist\" no ChangePassword e outras funções.\r\n    -   Corrigido em: ChangePassword, ChangePackage, ClientArea e AdminServicesTabFields.\r\n-   **v2.5.0 (2026-02-14):**\r\n    -   **Correção:** ChangePassword reestruturado — agora usa API OCS do Nextcloud como método principal (mais rápido e fiável), com fallback para SSH/docker exec occ.\r\n    -   **Correção:** restartInstance no SSHManager corrigido — o manage.sh v10.0 não tem comando `restart`, agora faz `stop` + `start` corretamente.\r\n    -   **Novo:** Quota padrão para todos os utilizadores — ao criar instância ou alterar pacote, a quota é aplicada tanto ao admin como definida como padrão para novos utilizadores via `config:app:set files default_quota`.\r\n    -   **Novo:** Função `setDefaultQuota()` no SSHManager para definir quota padrão via `occ config:app:set`.\r\n    -   **Melhoria:** Logging detalhado no ChangePassword com rastreio de cada etapa (API OCS, fallback SSH).\r\n    -   **Melhoria:** Mensagens de erro mais informativas incluindo output e error do SSH.\r\n-   **v2.4.5 (2026-02-13):**\r\n    -   **Novo:** Hook de personalização da tela de domínio no carrinho — remove o prefixo \"www.\" e o campo de TLD, substituindo por um campo único de domínio completo.\r\n    -   **Novo:** Instruções de DNS exibidas automaticamente na tela de pedido (3 registros A necessários).\r\n    -   **Novo:** Validação automática que remove \"www.\" se o cliente o incluir no domínio.\r\n    -   **Melhoria:** Botões \"Ver Credenciais\", \"Ver Logs\" e \"Verificar Estado\" agora exibem dados em painéis HTML formatados na aba de serviços do admin, em vez de mensagens de erro.\r\n    -   **Correção:** Botão \"Ver Credenciais\" corrigido — usava método inexistente `credentialsInstance()`, agora usa `getCredentials()`.\r\n    -   **Novo:** Painel de credenciais com layout em grid, organizado por serviço (Nextcloud, Collabora, MariaDB, TURN, Signaling, HaRP, DNS).\r\n    -   **Novo:** Painel de logs com terminal escuro e scroll automático.\r\n    -   **Novo:** Painel de estado com badge colorido (Ativo/Parcial/Parado) e lista detalhada de containers.\r\n-   **v2.3.2 (2026-02-13):**\r\n    -   **Correção:** Botão \"Testar API Nextcloud\" agora obtém a password real do admin a partir do ficheiro `.credentials` via SSH, corrigindo o erro \"Unauthorised\".\r\n    -   **Melhoria:** Mensagens de erro mais descritivas no teste de API.\r\n-   **v2.3.1 (2026-02-12):**\r\n    -   **Correção:** Armazenamento na área de cliente agora usa SSH (`du -sh`) em vez da API OCS, alinhando com o painel admin.\r\n-   **v2.3.0 (2026-02-12):**\r\n    -   **Correção:** Utilizador padrão na área de cliente agora é \"admin\".\r\n    -   **Melhoria:** `parseCredentials()` reescrito para usar `strpos` em vez de regex, corrigindo problemas com UTF-8.\r\n-   **v2.2.0 (2026-02-12):**\r\n    -   **Correção:** Comandos SSH agora usam `sudo -n` (NOPASSWD) em vez de `echo password | sudo -S`.\r\n-   **v2.1.0 (2026-02-12):**\r\n    -   **Melhoria:** Adicionado `phpseclib3` para comunicação SSH em PHP puro, eliminando dependências externas.\r\n-   **v2.0.0 (2026-02-11):**\r\n    -   Versão inicial reescrita para integrar com `manage.sh` v10.0.\r\n\r\n---\r\n\r\n## 5. Ficheiros do Módulo\r\n\r\n-   `nextcloudsaas.php`: Ficheiro principal com toda a lógica do ciclo de vida, botões e integração com o WHMCS.\r\n-   `lib/SSHManager.php`: Classe robusta para gerir a comunicação SSH, com métodos que são wrappers diretos dos comandos do `manage.sh`.\r\n-   `lib/Helper.php`: Funções utilitárias para formatação, validação e extração de configurações.\r\n-   `lib/NextcloudAPI.php`: Cliente para a API OCS do Nextcloud, usado para testes de conectividade e alteração de passwords.\r\n-   `templates/clientarea.tpl`: Template Smarty para a área de cliente, com um design moderno e informativo.\r\n-   `hooks.php`: Referência para o ficheiro principal de hooks.\r\n-   `includes/hooks/nextcloudsaas_hooks.php`: Hooks completos do módulo — ciclo de vida, personalização do carrinho, verificação DNS por cron, provisionamento automático, emails e notificações.\r\n-   `whmcs.json`: Metadados do módulo.\r\n-   `vendor/`: Contém a biblioteca `phpseclib3`.\r\n\r\n---\r\n\r\n## 6. Operar\r\n\r\n### 6.1. Destravar um Order que ficou em Pending\r\n\r\nA partir da **v3.1.5** o ciclo `Pending → Active` é fechado automaticamente em duas situações: (a) quando o `CreateAccount` é executado pelo admin e retorna `success`; (b) quando o `AfterCronJob` provisiona automaticamente após o DNS ficar correto. Em ambos os casos o módulo chama `localAPI('AcceptOrder', [...])` (com `autosetup=false` e `sendemail=false`) e registra a transição em **Utilities \u003e Logs \u003e Activity Log**.\r\n\r\nSe ainda assim um Order ficar em **Pending** — por exemplo, se a instância foi criada antes da v3.1.5, ou se o `CreateAccount` falhou em algum passo intermediário e foi recuperado manualmente no servidor — você tem três caminhos, em ordem de menor para maior intervenção:\r\n\r\n| Caminho | Quando usar | Ação |\r\n|---|---|---|\r\n| **Botão \"Provisionar Agora\"** | A instância já existe no servidor (criada pelo cron anterior ou via `manage.sh` manual) e o Order continua Pending; ou o cliente acabou de corrigir o DNS e você não quer esperar 5 minutos pelo cron | **Products/Services do cliente \u003e Module Commands \u003e Provisionar Agora**. O módulo detecta a instância existente, reusa as credenciais, ativa o serviço e aceita o Order. Mostra um painel com `success` e o status do Order. |\r\n| **Module Create + AcceptOrder** | A v3.1.5 está instalada mas você prefere o fluxo nativo do WHMCS | **Products/Services do cliente \u003e Module Commands \u003e Create**. O `CreateAccount` v3.1.5 já chama `AcceptOrder` ao final, ativando o Order automaticamente. |\r\n| **Accept Order manual** | Você só quer ativar o Order, sem reexecutar o módulo | **Orders \u003e List Pending Orders \u003e [pedido] \u003e Accept Order**. Ative com `autosetup=false` para não disparar o módulo. Em seguida, **Products/Services do cliente** \u003e mude **Status** para **Active** se ainda não estiver. |\r\n\r\n### 6.2. Diagnóstico em logs\r\n\r\nFiltre **Utilities \u003e Logs \u003e Activity Log** por `Nextcloud SaaS` para ver:\r\n\r\n- `Nextcloud SaaS Cron: DNS CONFIRMADO` — DNS começou a apontar corretamente.\r\n- `Nextcloud SaaS Cron: PROVISIONAMENTO CONCLUÍDO` — `manage.sh create` rodou e retornou `success`.\r\n- `Nextcloud SaaS Cron: Order do Serviço #X aceito automaticamente (Pending -\u003e Active)` — v3.1.5 fechou o ciclo.\r\n- `Nextcloud SaaS: Botão \"Provisionar Agora\" executado para Serviço #X - sucesso. Order ativado: sim.` — execução manual do botão.\r\n- `Nextcloud SaaS Cron: ERRO NO PROVISIONAMENTO` — falha do `manage.sh`. A mensagem `Erro:` indica o que falhou.\r\n\r\nPara inspeção mais profunda, o módulo grava entradas detalhadas via `Helper::log` em **Utilities \u003e Logs \u003e Module Log** (chave `nextcloudsaas`). Procure pelos eventos `CreateAccount_reuse` (fast-path acionado), `CreateAccount_recovered_after_error` (recuperação após `manage.sh` retornar não-zero), `AcceptOrder` e `provisionNow_result`.\r\n","../USAGE.md":"# Guia de Utilização: Módulo Nextcloud-SaaS para WHMCS\r\n\r\n**Versão do Módulo:** 3.1.7\r\n**Versão do manage.sh:** 11.x (v11.3+)\r\n\r\nEste documento detalha a função de cada um dos **Module Commands** disponíveis na área de administração do WHMCS para um serviço que utiliza o módulo Nextcloud-SaaS. Estes botões permitem ao administrador gerir o ciclo de vida completo e realizar operações de manutenção numa instância Nextcloud diretamente a partir do WHMCS.\r\n\r\n---\r\n\r\n## Arquitetura da Plataforma\r\n\r\nCada instância Nextcloud é composta por **3 containers Docker dedicados** (`\u003ccliente\u003e-app`, `\u003ccliente\u003e-cron`, `\u003ccliente\u003e-harp`) que se conectam a **8 serviços globais `shared-*`** (db, redis, collabora, turn, nats, janus, signaling, recording) geridos via `docker-compose` no host. Tudo fica atrás do proxy reverso **Traefik** com SSL automático via Let's Encrypt. Não é utilizado Apache nem Nginx diretamente — toda a infraestrutura é baseada em containers (arquitetura compartilhada do manager v11.x).\r\n\r\n**Containers dedicados por cliente (3):**\r\n\r\n| Container               | Imagem               | Função                                              |\r\n|-------------------------|----------------------|-----------------------------------------------------|\r\n| **`\u003ccliente\u003e-app`**     | Nextcloud (oficial)  | Aplicação Nextcloud principal                       |\r\n| **`\u003ccliente\u003e-cron`**    | Nextcloud (cron)     | Execução de tarefas agendadas em background         |\r\n| **`\u003ccliente\u003e-harp`**    | HaRP                 | Daemon para AppAPI (substitui Docker Socket Proxy)  |\r\n\r\n**Serviços globais compartilhados (8):**\r\n\r\n| Container               | Imagem                | Função                                                  |\r\n|-------------------------|-----------------------|---------------------------------------------------------|\r\n| **shared-db**           | MariaDB 10.11         | Base de dados relacional compartilhada                  |\r\n| **shared-redis**        | Redis Alpine          | Cache e locking de ficheiros                            |\r\n| **shared-collabora**    | Collabora Online      | Edição colaborativa de documentos (Nextcloud Office)   |\r\n| **shared-turn**         | coturn                | Servidor TURN/STUN global para WebRTC (Talk)            |\r\n| **shared-nats**         | NATS                  | Messaging para o High Performance Backend (HPB)         |\r\n| **shared-janus**        | Janus Gateway         | Gateway WebRTC para o HPB (Talk)                        |\r\n| **shared-signaling**    | Spreed Signaling      | Servidor de sinalização para o HPB (Talk)               |\r\n| **shared-recording**    | Talk Recording Server | Gravação de chamadas Talk (novidade do manager v11.x)  |\r\n\r\nCada instância requer apenas **1 registro DNS** (tipo A) apontando para o IP do servidor:\r\n\r\n1. `dominio.com.br` — Nextcloud\r\n\r\n\u003e Os serviços auxiliares (Collabora, HPB Signaling e TURN) deixaram de exigir DNS por cliente: passam a ser publicados em hostnames globais (`collabora.\u003cbase\u003e`, `signaling.\u003cbase\u003e`, `turn-01.\u003cbase\u003e`) configurados no servidor via `--collabora-domain`, `--signaling-domain` e `--turn-domain` do `manage.sh`.\r\n\r\nOs ficheiros de cada instância ficam em `/opt/nextcloud-customers/\u003cnome-cliente\u003e/`, incluindo o `docker-compose.yml`, `.env`, `.credentials` e os volumes dos containers.\r\n\r\n---\r\n\r\n## Visão Geral dos Comandos\r\n\r\nNa página de gestão de um produto/serviço do cliente no WHMCS (secção **Module Commands**), estão disponíveis **15 botões** organizados em duas categorias:\r\n\r\n- **Comandos do Ciclo de Vida Padrão** (7 botões): Create, Renew, Suspend, Unsuspend, Terminate, Change Package, Change Password\r\n- **Comandos Personalizados de Gestão e Diagnóstico** (8 botões): Verificar Estado, Reiniciar Instância, Fazer Backup, Atualizar Instância, Testar Conexão SSH, Testar API Nextcloud, Ver Credenciais, Ver Logs\r\n\r\n---\r\n\r\n## 1. Comandos do Ciclo de Vida Padrão\r\n\r\nEstes são os comandos padrão do WHMCS para automação de provisionamento. São acionados automaticamente com base nas ações do cliente e da faturação (por exemplo, pagamento de fatura ou pedido de cancelamento), mas também podem ser executados manualmente pelo administrador.\r\n\r\n### Create\r\n\r\n**Função PHP:** `nextcloudsaas_CreateAccount`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e \u003cdominio\u003e create`\r\n\r\nProvisiona uma nova instância Nextcloud completa no servidor. O módulo conecta-se via SSH ao servidor e executa o `manage.sh` com o comando `create`, que realiza automaticamente as seguintes operações:\r\n\r\n1. Verifica o registro DNS necessário (apenas o domínio principal do Nextcloud)\r\n2. Gera passwords aleatórias para todos os serviços (admin Nextcloud, Collabora, MariaDB, TURN, Signaling, HaRP)\r\n3. Encontra uma porta TURN disponível (range 3478-3999)\r\n4. Cria o diretório da instância em `/opt/nextcloud-customers/\u003ccliente\u003e/`\r\n5. Gera os ficheiros `.env`, `.credentials`, `docker-compose.yml` e configurações HPB\r\n6. Inicia os 3 containers dedicados (`app`, `cron`, `harp`) via `docker-compose up -d` e os conecta aos serviços globais `shared-*`\r\n7. Aguarda o Nextcloud ficar instalado (até 9 minutos)\r\n8. Executa 16 passos de pós-instalação:\r\n   - Configura background jobs via cron\r\n   - Configura Redis como cache e locking\r\n   - Configura trusted proxies e overwrite protocol (HTTPS)\r\n   - Corrige índices da base de dados\r\n   - Executa reparos e migração de mimetypes\r\n   - Instala aplicativos essenciais (Nextcloud Office, Calendar, Contacts, Mail, Deck, Forms, Group Folders, Notes, Tasks, Photos, Activity, Talk, AppAPI, Client Push)\r\n   - Configura Collabora Online (WOPI URL)\r\n   - Configura Talk com TURN/STUN server\r\n   - Configura Talk HPB (Signaling Server)\r\n   - Configura AppAPI com HaRP daemon\r\n   - Configura trusted domains\r\n   - Configura Client Push (notify_push)\r\n   - Configurações de segurança e reparo final\r\n9. Executa verificação final de todos os componentes\r\n10. Grava as credenciais no ficheiro `.credentials`\r\n\r\nApós a execução bem-sucedida, o módulo WHMCS atualiza automaticamente os campos do serviço (username, password, domínio, IP) e os campos personalizados (Client Name, Nextcloud URL, Collabora URL, Signaling URL). Se configurada, aplica também a quota de armazenamento ao utilizador admin.\r\n\r\n### Renew\r\n\r\n**Função PHP:** `nextcloudsaas_Renew`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e _ status` (e `start` se necessário)\r\n\r\nVerifica se a instância está ativa e, caso não esteja a correr, tenta iniciá-la automaticamente executando `manage.sh start`. A renovação do serviço em si é gerida pelo ciclo de faturação do WHMCS. Esta função garante que a instância está operacional no momento da renovação.\r\n\r\n### Suspend\r\n\r\n**Função PHP:** `nextcloudsaas_SuspendAccount`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e _ stop`\r\n\r\nSuspende temporariamente uma instância Nextcloud, parando os 3 containers dedicados (`app`, `cron`, `harp`) via `docker-compose stop`. Os containers são parados mas não removidos, e todos os volumes de dados (ficheiros do Nextcloud, configurações e a base de dados desta instância dentro do `shared-db`) permanecem intactos. Os serviços globais `shared-*` continuam a funcionar normalmente para as restantes instâncias. O cliente deixa de conseguir aceder ao seu Nextcloud enquanto os containers dedicados estiverem parados.\r\n\r\nEsta ação é tipicamente acionada automaticamente quando uma fatura não é paga dentro do prazo configurado no WHMCS.\r\n\r\n### Unsuspend\r\n\r\n**Função PHP:** `nextcloudsaas_UnsuspendAccount`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e _ start`\r\n\r\nReativa uma instância Nextcloud que foi previamente suspensa, reiniciando os 3 containers dedicados via `docker-compose up -d`. O cliente volta a poder aceder ao seu Nextcloud normalmente, com todos os dados intactos.\r\n\r\nEsta ação é tipicamente acionada automaticamente quando o cliente paga a fatura em atraso.\r\n\r\n### Terminate\r\n\r\n**Função PHP:** `nextcloudsaas_TerminateAccount`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e _ backup` seguido de `manage.sh \u003ccliente\u003e _ remove`\r\n\r\nTermina e remove permanentemente uma instância Nextcloud. O módulo executa automaticamente um **backup de segurança** antes da remoção. Em seguida, o `manage.sh remove` realiza as seguintes operações:\r\n\r\n1. Para e remove todos os containers e volumes via `docker-compose down -v --remove-orphans`\r\n2. Remove manualmente quaisquer containers órfãos (todos os 10 sufixos)\r\n3. Apaga o diretório completo da instância em `/opt/nextcloud-customers/\u003ccliente\u003e/`\r\n\r\n\u003e **Atenção:** Esta ação é **irreversível** após a remoção do diretório. O backup automático fica guardado em `/opt/nextcloud-customers/backups/` e pode ser usado para restaurar a instância se necessário.\r\n\r\n### Change Package\r\n\r\n**Função PHP:** `nextcloudsaas_ChangePackage`\r\n**Comando no servidor:** `docker exec -u www-data \u003ccliente\u003e-app php occ user:setting \u003cuser\u003e files quota \u003cvalor\u003e`\r\n\r\nAltera o pacote de alojamento de uma instância, atualizando a quota de armazenamento do utilizador admin. O módulo conecta-se via SSH e executa o comando `occ user:setting` diretamente no container `app` da instância para ajustar o limite de espaço em disco conforme o novo pacote selecionado no WHMCS.\r\n\r\n### Change Password\r\n\r\n**Função PHP:** `nextcloudsaas_ChangePassword`\r\n**Comando no servidor:** `docker exec -u www-data -e OC_PASS \u003ccliente\u003e-app php occ user:resetpassword --password-from-env \u003cuser\u003e`\r\n\r\nAltera a password do utilizador admin do Nextcloud. O módulo tenta primeiro alterar via API OCS do Nextcloud (mais rápido). Se falhar, usa o fallback via SSH executando o comando `occ user:resetpassword` diretamente no container `app`. A nova password é a que está definida no campo \"Password\" do serviço no WHMCS.\r\n\r\n---\r\n\r\n## 2. Comandos Personalizados de Gestão e Diagnóstico\r\n\r\nEstes botões foram adicionados especificamente para o módulo Nextcloud-SaaS, fornecendo funcionalidades de gestão e diagnóstico que facilitam a administração das instâncias sem necessidade de acesso direto ao servidor.\r\n\r\n### Verificar Estado\r\n\r\n**Função PHP:** `nextcloudsaas_checkStatus`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e _ status`\r\n\r\nVerifica o estado detalhado da instância Nextcloud. O `manage.sh status` verifica o estado dos 3 containers dedicados desta instância (`app`, `cron`, `harp`) e apresenta:\r\n\r\n- Estado de cada container (running/stopped/exited)\r\n- URLs de acesso (Nextcloud, Collabora, Signaling)\r\n- Porta TURN configurada\r\n- Resultado do `occ status` para verificar se o Nextcloud está a responder\r\n\r\nÚtil para confirmar rapidamente se todos os componentes do serviço estão operacionais.\r\n\r\n### Reiniciar Instância\r\n\r\n**Função PHP:** `nextcloudsaas_restartInstance`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e _ stop` seguido de `manage.sh \u003ccliente\u003e _ start`\r\n\r\nReinicia os 3 containers dedicados da instância (`app`, `cron`, `harp`), executando um `docker-compose stop` seguido de `docker-compose up -d` com um intervalo de 3 segundos entre as operações. Os serviços globais `shared-*` não são tocados. Este comando é útil nas seguintes situações:\r\n\r\n- Após alterações de configuração\r\n- Quando a instância apresenta lentidão ou erros intermitentes\r\n- Para resolver problemas de conectividade entre containers\r\n- Após atualizações de configuração do Nextcloud\r\n\r\n### Fazer Backup\r\n\r\n**Função PHP:** `nextcloudsaas_backupInstance`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e _ backup`\r\n\r\nCria um backup completo da instância Nextcloud. O `manage.sh backup` executa as seguintes operações:\r\n\r\n1. Ativa o modo de manutenção do Nextcloud (`occ maintenance:mode --on`)\r\n2. Exporta a base de dados MariaDB via `mysqldump` para `db_backup.sql`\r\n3. Para todos os containers (`docker-compose stop`)\r\n4. Compacta todo o diretório da instância num ficheiro `.tar.gz`\r\n5. Reinicia todos os containers (`docker-compose up -d`)\r\n6. Desativa o modo de manutenção (`occ maintenance:mode --off`)\r\n\r\nO backup é guardado em `/opt/nextcloud-customers/backups/\u003ccliente\u003e-backup-\u003cdata_hora\u003e.tar.gz`. Recomenda-se executar este comando antes de operações críticas como **Terminate** ou **Atualizar Instância**.\r\n\r\n### Atualizar Instância\r\n\r\n**Função PHP:** `nextcloudsaas_updateInstance`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e _ update`\r\n\r\nAtualiza a instância Nextcloud para a versão mais recente disponível. O `manage.sh update` executa as seguintes operações:\r\n\r\n1. Faz um **backup de segurança** automático antes de atualizar\r\n2. Baixa as novas imagens Docker (`docker-compose pull`)\r\n3. Recria os containers com as novas imagens (`docker-compose up -d`)\r\n4. Aguarda 15 segundos para os containers estabilizarem\r\n5. Executa o upgrade do Nextcloud (`occ upgrade`)\r\n6. Corrige índices da base de dados (`occ db:add-missing-indices`)\r\n7. Desativa o modo de manutenção (`occ maintenance:mode --off`)\r\n\r\n\u003e **Recomendação:** Embora o update já faça backup automático, é boa prática verificar o estado da instância após a atualização usando o botão **Verificar Estado**.\r\n\r\n### Testar Conexão SSH\r\n\r\n**Função PHP:** `nextcloudsaas_testSSH`\r\n**Comando no servidor:** `echo \"SSH_CONNECTION_OK\" && hostname && uptime`\r\n\r\nTesta a ligação SSH entre o WHMCS e o servidor da instância. Verifica se consegue estabelecer uma conexão SSH (via phpseclib3, ssh2 ou sshpass como fallback) e executar comandos simples. Retorna:\r\n\r\n- **Sucesso** — A conexão SSH está a funcionar corretamente, com o hostname e uptime do servidor\r\n- **Erro** — Com detalhes sobre o problema (timeout, autenticação falhada, host inacessível)\r\n\r\nEste é o **primeiro comando de diagnóstico** a executar quando qualquer outro comando falha, pois todos os comandos do módulo dependem da conexão SSH para comunicar com o servidor.\r\n\r\n### Testar API Nextcloud\r\n\r\n**Função PHP:** `nextcloudsaas_testAPI`\r\n**Comando no servidor:** Leitura do `.credentials` via SSH + chamada HTTP à API OCS\r\n\r\nTesta a ligação com a API OCS do Nextcloud. Este comando realiza as seguintes operações:\r\n\r\n1. Conecta-se via SSH ao servidor e lê o ficheiro `.credentials` da instância para obter a password real do admin\r\n2. Faz uma chamada HTTP à API OCS (`GET /ocs/v1.php/cloud/capabilities`) com autenticação HTTP Basic\r\n3. Verifica se a resposta é válida e se a autenticação foi aceite pelo Nextcloud\r\n\r\nRetorna **Sucesso** se a API responder corretamente, ou uma mensagem de erro detalhada. Útil para verificar se o Nextcloud está a responder a pedidos HTTP e se as credenciais do admin estão corretas.\r\n\r\n### Ver Credenciais\r\n\r\n**Função PHP:** `nextcloudsaas_viewCredentials`\r\n**Comando no servidor:** `manage.sh \u003ccliente\u003e _ credentials` (leitura do ficheiro `.credentials`)\r\n\r\nExibe as credenciais completas da instância. O ficheiro `.credentials` contém:\r\n\r\n- **Nextcloud:** URL de acesso, utilizador admin e password\r\n- **Collabora Online:** URL de acesso, admin e password\r\n- **Base de Dados (MariaDB):** Host, database, utilizador, password e root password\r\n- **TURN Server:** Secret, porta e endereço\r\n- **Signaling Server:** URL e secret\r\n- **HaRP (AppAPI):** Shared key\r\n- **DNS necessário:** 1 registro A com o IP do servidor (apenas o domínio principal)\r\n\r\n### Ver Logs\r\n\r\n**Função PHP:** `nextcloudsaas_viewLogs`\r\n**Comando no servidor:** `docker logs --tail 100 \u003ccliente\u003e-app 2\u003e&1`\r\n\r\nExibe as últimas **100 linhas** dos logs do container principal (`app`) da instância Nextcloud. Os logs são obtidos diretamente do Docker via `docker logs`, não de ficheiros de log do Apache (que não é utilizado nesta arquitetura).\r\n\r\nEste comando é essencial para diagnosticar problemas na aplicação, tais como:\r\n\r\n- Erros de PHP ou de módulos do Nextcloud\r\n- Problemas de conectividade com a base de dados ou Redis\r\n- Erros de configuração do Nextcloud\r\n- Falhas em tarefas de background\r\n- Problemas com apps instalados\r\n\r\n---\r\n\r\n## Resumo Rápido\r\n\r\n| Botão | Categoria | Comando manage.sh | Ação Principal |\r\n|---|---|---|---|\r\n| **Create** | Ciclo de Vida | `create` | Provisiona 3 containers dedicados + integração com 8 `shared-*` + 16 passos de pós-instalação |\r\n| **Renew** | Ciclo de Vida | `status` / `start` | Verifica e reinicia se necessário |\r\n| **Suspend** | Ciclo de Vida | `stop` | Para os 3 containers dedicados (dados intactos) |\r\n| **Unsuspend** | Ciclo de Vida | `start` | Reinicia os 3 containers dedicados |\r\n| **Terminate** | Ciclo de Vida | `backup` + `remove` | Backup automático + remoção permanente |\r\n| **Change Package** | Ciclo de Vida | `occ` (via Docker) | Altera quota de armazenamento |\r\n| **Change Password** | Ciclo de Vida | API OCS / `occ` | Altera password do admin |\r\n| **Verificar Estado** | Gestão | `status` | Estado dos 3 containers dedicados + occ status |\r\n| **Serviços Compartilhados** | Gestão | n/a (docker ps) | Estado dos 8 serviços globais `shared-*` |\r\n| **Listar Instâncias do Servidor** (v3.1.0) | Gestão | `ls /opt/nextcloud-customers` + `docker ps` + `du -sh` | Dashboard HTML consolidado com todas as instâncias e uso de disco |\r\n| **Ver Logs Talk Recording** (v3.1.0) | Diagnóstico | `docker logs --tail 100 shared-recording` | Logs do serviço global de gravação de chamadas Talk |\r\n| **Reiniciar Instância** | Gestão | `stop` + `start` | Para e reinicia todos os containers |\r\n| **Fazer Backup** | Gestão | `backup` | mysqldump + tar.gz de toda a instância |\r\n| **Atualizar Instância** | Gestão | `update` | Backup + pull + upgrade + reindex |\r\n| **Testar Conexão SSH** | Diagnóstico | — | Testa conexão SSH com o servidor |\r\n| **Testar API Nextcloud** | Diagnóstico | — | Testa API OCS com credenciais reais |\r\n| **Ver Credenciais** | Diagnóstico | `credentials` | Exibe todas as credenciais da instância |\r\n| **Ver Logs** | Diagnóstico | `docker logs` | Últimas 100 linhas do container app |\r\n\r\n---\r\n\r\n## Aplicativos Instalados Automaticamente\r\n\r\nCada instância Nextcloud é criada com os seguintes aplicativos pré-instalados e configurados:\r\n\r\n| Aplicativo | Descrição |\r\n|---|---|\r\n| **Nextcloud Office** (richdocuments) | Edição colaborativa de documentos via Collabora Online |\r\n| **Calendar** | Calendário com suporte a CalDAV |\r\n| **Contacts** | Gestão de contactos com suporte a CardDAV |\r\n| **Mail** | Cliente de email integrado |\r\n| **Deck** | Quadros Kanban para gestão de projetos |\r\n| **Forms** | Criação de formulários e inquéritos |\r\n| **Group Folders** | Pastas partilhadas por grupos |\r\n| **Notes** | Notas com suporte a Markdown |\r\n| **Tasks** | Gestão de tarefas |\r\n| **Photos** | Galeria de fotos com reconhecimento facial |\r\n| **Activity** | Registo de atividades e notificações |\r\n| **Talk** (spreed) | Videoconferência com HPB (TURN/STUN + Signaling) |\r\n| **AppAPI** | API para aplicações externas via HaRP |\r\n| **Client Push** (notify_push) | Notificações push em tempo real |\r\n\r\n---\r\n\r\n**Módulo Nextcloud-SaaS para WHMCS** — Desenvolvido por Defensys Tech\r\n"};
    const container = document.getElementById('docContainer');
    const placeholder = document.getElementById('placeholder');
    const toolbar = document.getElementById('toolbar');
    const btnExport = document.getElementById('btnExport');
    const contentWrapper = document.getElementById('contentWrapper');
    const filterInput = document.getElementById('docFilter');
    const themeToggle = document.getElementById('themeToggle');
    const btnDecreaseFont = document.getElementById('btnDecreaseFont');
    const btnIncreaseFont = document.getElementById('btnIncreaseFont');
    let currentFile = null;

    let currentFontSize = parseFloat(localStorage.getItem('docs-font-size')) || 1;
    function updateFontSize() {
      document.documentElement.style.setProperty('--doc-font-size', currentFontSize + 'rem');
      localStorage.setItem('docs-font-size', currentFontSize);
    }
    updateFontSize();
    if (btnDecreaseFont && btnIncreaseFont) {
      btnDecreaseFont.addEventListener('click', () => { if (currentFontSize > 0.8) { currentFontSize -= 0.1; updateFontSize(); } });
      btnIncreaseFont.addEventListener('click', () => { if (currentFontSize < 1.6) { currentFontSize += 0.1; updateFontSize(); } });
    }

    function setTheme(theme) {
      document.documentElement.className = theme;
      localStorage.setItem('docs-theme', theme);
      document.getElementById('moonIcon').style.display = theme === 'light' ? 'block' : 'none';
      document.getElementById('sunIcon').style.display = theme === 'dark' ? 'block' : 'none';
    }
    
    const savedTheme = localStorage.getItem('docs-theme') || 'dark';
    setTheme(savedTheme);

    themeToggle.addEventListener('click', () => {
      setTheme(document.documentElement.className === 'light' ? 'dark' : 'light');
    });

    filterInput.addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.doc-link').forEach(function(btn) {
        const text = btn.textContent.toLowerCase();
        btn.parentElement.style.display = text.includes(term) ? '' : 'none';
      });
    });

    function renderDoc(file) {
      const raw = DOCS[file];
      if (!raw) return;
      currentFile = file;
      placeholder.style.display = 'none';
      toolbar.style.display = 'flex';
      
      document.querySelectorAll('.doc-link').forEach(function (el) {
        el.classList.toggle('active', el.getAttribute('data-file') === file);
      });
      
      const div = document.createElement('div');
      div.className = 'doc-content active';
      div.id = 'content-' + file.replace(/./g, '-');
      div.innerHTML = marked.parse(raw);
      
      div.querySelectorAll('pre').forEach(pre => {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copiar';
        btn.addEventListener('click', () => {
          const code = pre.querySelector('code')?.innerText || pre.innerText;
          navigator.clipboard.writeText(code).then(() => {
            btn.textContent = 'Copiado!';
            setTimeout(() => { btn.textContent = 'Copiar'; }, 2000);
          });
        });
        pre.appendChild(btn);
      });
      
      container.innerHTML = '';
      container.appendChild(div);
      contentWrapper.scrollTop = 0;
      document.getElementById('progressBar').style.width = '0%';

      const tocContainer = document.getElementById('tocContainer');
      const tocList = document.getElementById('tocList');
      if (tocContainer && tocList) {
        tocList.innerHTML = '';
        const headings = div.querySelectorAll('h2, h3');
        if (headings.length > 0) {
          tocContainer.classList.add('active');
          headings.forEach((h, index) => {
            if (!h.id) h.id = 'heading-' + index;
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#' + h.id;
            a.className = 'toc-link ' + (h.tagName === 'H2' ? 'toc-h2' : 'toc-h3');
            a.textContent = h.textContent;
            a.addEventListener('click', (e) => {
              e.preventDefault();
              h.scrollIntoView({ behavior: 'smooth' });
            });
            li.appendChild(a);
            tocList.appendChild(li);
          });
        } else {
          tocContainer.classList.remove('active');
        }
      }
    }

    contentWrapper.addEventListener('scroll', () => {
      const scrollTop = contentWrapper.scrollTop;
      const scrollHeight = contentWrapper.scrollHeight - contentWrapper.clientHeight;
      const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
      document.getElementById('progressBar').style.width = progress + '%';
    });

    document.querySelectorAll('.doc-link').forEach(function (btn) {
      btn.addEventListener('click', function () {
        renderDoc(this.getAttribute('data-file'));
      });
    });

    btnExport.addEventListener('click', function () {
      if (!currentFile || !DOCS[currentFile]) return;
      const blob = new Blob([DOCS[currentFile]], { type: 'text/markdown;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = currentFile;
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
