# PR Security Review — Merlin AI (open source, MIT)
# Scans PR diffs for security vulnerabilities and posts inline comments.
# Requires: ANTHROPIC_API_KEY (or OPENAI_API_KEY) in GitHub Secrets.
# Docs: https://merlin-review.com/docs/quickstart

name: PR Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    if: "!contains(github.event.pull_request.labels.*.name, 'skip-ci-review')"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/arunachalamkalimuthu/merlin-ai-code-review:latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Merlin Security Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "Skipping Merlin review — ANTHROPIC_API_KEY not configured."
            exit 0
          fi
          merlin review

      - name: Register CI Issues (summary only)
        if: failure()
        run: |
          ISSUE_ID="CI-SEC-$(date +%Y%m%d%H%M%S)"
          echo "### ${ISSUE_ID} — Security findings in PR #${{ github.event.pull_request.number }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Workflow: pr-security-review" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Review Merlin inline comments on the PR." >> "${GITHUB_STEP_SUMMARY}"
